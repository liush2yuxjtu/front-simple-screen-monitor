<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0f06">
<title>折扇 · Folding Fan</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%F0%9F%AA%AD%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background: radial-gradient(ellipse at 50% 30%, #3b2812 0%, #120904 70%, #080302 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
    max-width: 760px;
    padding: 20px;
  }

  .head {
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--gold-hi);
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .fan-wrap {
    position: relative;
    margin: 10px auto;
    width: 520px;
    height: 320px;
    max-width: 92vw;
  }

  .fan {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform-origin: 50% 100%;
    width: 100px;
    height: 100%;
    transform: translateX(-50%);
  }

  .rib {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 8px;
    height: 100%;
    margin-left: -4px;
    background: linear-gradient(180deg, var(--parch) 0%, var(--parch-hi) 50%, var(--parch) 100%);
    border: 1px solid #7a5510;
    border-radius: 4px 4px 2px 2px;
    transform-origin: 50% 100%;
    transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.3, 1);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
  }

  .rib::before {
    content: '';
    position: absolute;
    inset: 4px 1px 18px;
    background: linear-gradient(180deg, transparent, rgba(90, 58, 24, 0.15));
    border-radius: 2px;
  }

  .rib-label {
    position: absolute;
    top: 14%;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    font-family: var(--font-brush);
    font-size: 14px;
    color: var(--ink);
    letter-spacing: 1px;
    line-height: 1.3;
    text-align: center;
    word-break: break-all;
    line-break: strict;
    writing-mode: vertical-rl;
    white-space: nowrap;
  }

  .pivot {
    position: absolute;
    left: 50%;
    bottom: -6px;
    width: 22px;
    height: 22px;
    margin-left: -11px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #e9c36b, #8b6510 70%, #3b2812 100%);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
    z-index: 20;
  }

  .verdict-zone {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    pointer-events: none;
  }
  .verdict-zone.left { left: 0; }
  .verdict-zone.right { right: 0; }

  .side-mark {
    position: absolute;
    top: 30%;
    font-family: var(--font-brush);
    font-size: 54px;
    letter-spacing: 4px;
    opacity: 0.2;
    transition: opacity 0.25s;
  }
  .side-mark.left { left: 4%; color: #c02a2a; }
  .side-mark.right { right: 4%; color: #e9c36b; }
  .side-mark.on { opacity: 0.8; }

  .request-frame {
    margin: 26px auto 0;
    max-width: 480px;
    padding: 20px 24px;
    background: rgba(14, 8, 4, 0.5);
    border: 1px solid rgba(184, 137, 42, 0.25);
    border-radius: 2px;
  }
  .request-frame .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 8px; }
  .request-frame .intent { font-family: var(--font-brush); font-size: 20px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 10px; }
  .request-frame .reason { font-size: 13px; color: #b4a080; line-height: 1.7; font-style: italic; }

  .instruction {
    margin-top: 28px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
  }

  .fan.opening { cursor: grab; }
  .fan.opening:active { cursor: grabbing; }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">折扇</div><div class="en">Folding Fan</div></div>

<div class="side-mark left" id="mk-l">驳</div>
<div class="side-mark right" id="mk-r">准</div>

<div class="stage">
  <div class="head">Chamber · VI</div>
  <div class="fan-wrap">
    <div class="fan" id="fan">
      <!-- ribs will be generated -->
      <div class="pivot"></div>
    </div>
  </div>
  <div class="request-frame req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
    <div style="margin-top:8px;"><span class="req-risk" id="r-risk"></span></div>
  </div>
  <div class="instruction">拖开折扇 · 左展为驳 · 右展为准</div>
</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  const fan = document.getElementById('fan');
  const ribLabels = ['陛', '下', '裁', '夺', '御', '笔', '朱', '批', '天'];
  const N = 9;

  for (let i = 0; i < N; i++) {
    const r = document.createElement('div');
    r.className = 'rib';
    r.innerHTML = `<span class="rib-label">${ribLabels[i] || ''}</span>`;
    r.dataset.i = i;
    fan.appendChild(r);
  }
  const ribs = [...fan.querySelectorAll('.rib')];

  let spread = 0; // -90 (full left) to 90 (full right), 0 closed
  let dragging = false;
  let startX = 0;
  let committed = false;

  function updateFan() {
    // spread in degrees total (absolute). sign = direction
    const total = Math.abs(spread);
    const dir = spread === 0 ? 1 : Math.sign(spread);
    ribs.forEach((r, i) => {
      const step = total / (N - 1);
      const centerIdx = (N - 1) / 2;
      const angle = (i - centerIdx) * step * dir;
      r.style.transform = `rotate(${angle}deg)`;
    });
    document.getElementById('mk-l').classList.toggle('on', spread < -20);
    document.getElementById('mk-r').classList.toggle('on', spread > 20);
  }
  updateFan();

  function startDrag(e) {
    if (committed) return;
    dragging = true;
    startX = e.touches ? e.touches[0].clientX : e.clientX;
    fan.classList.add('opening');
    ribs.forEach(r => r.style.transition = 'none');
    e.preventDefault();
  }

  function moveDrag(e) {
    if (!dragging) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    spread = Math.max(-80, Math.min(80, (x - startX) * 0.5));
    updateFan();
    if (Math.abs(spread) > 65 && !committed) {
      committed = true;
      const verdict = spread > 0 ? 'approve' : 'reject';
      setTimeout(() => window.cast(verdict), 300);
    }
  }

  function endDrag() {
    if (!dragging) return;
    dragging = false;
    if (committed) return;
    ribs.forEach(r => r.style.transition = '');
    spread = 0;
    updateFan();
  }

  fan.addEventListener('mousedown', startDrag);
  document.addEventListener('mousemove', moveDrag);
  document.addEventListener('mouseup', endDrag);
  fan.addEventListener('touchstart', startDrag, { passive: false });
  document.addEventListener('touchmove', moveDrag, { passive: false });
  document.addEventListener('touchend', endDrag);

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
    const risk = document.getElementById('r-risk');
    risk.textContent = '风险 · ' + window.riskLabel(r.risk);
    risk.className = 'req-risk ' + r.risk;
  }
  loadReq();

  window.nextRequest = () => {
    committed = false;
    spread = 0;
    ribs.forEach(r => r.style.transition = '');
    updateFan();
    loadReq();
  };
</script>
</body>
</html>

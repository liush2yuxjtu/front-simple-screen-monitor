<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0f06">
<title>签筒 · Fortune Sticks</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%F0%9F%8E%8B%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background: radial-gradient(ellipse at 50% 30%, #3b2812 0%, #120904 70%, #080302 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    text-align: center;
    width: 100%;
    max-width: 620px;
    padding: 20px;
  }

  .request {
    margin-bottom: 30px;
  }
  .request .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 8px; }
  .request .intent { font-family: var(--font-brush); font-size: 22px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 10px; }
  .request .reason { font-size: 13px; color: #b4a080; line-height: 1.7; font-style: italic; max-width: 460px; margin: 0 auto 10px; }

  .scene {
    position: relative;
    margin: 20px auto;
    width: 300px;
    height: 340px;
    user-select: none;
  }

  .base {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 40px;
    background: linear-gradient(180deg, #5a3a08 0%, #2a1808 100%);
    border-radius: 6px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
  }

  .tube {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) rotate(var(--tilt, 0deg));
    transform-origin: 50% 100%;
    width: 120px;
    height: 240px;
    background:
      linear-gradient(90deg, #5a3a08 0%, #b8892a 10%, #e9c36b 45%, #b8892a 90%, #5a3a08 100%);
    border: 2px solid #3b2812;
    border-radius: 6px 6px 10px 10px;
    box-shadow:
      inset -6px 0 12px rgba(0, 0, 0, 0.4),
      0 14px 30px rgba(0, 0, 0, 0.5);
    cursor: grab;
    transition: transform 0.15s cubic-bezier(0.4, 0.1, 0.3, 1);
  }
  .tube:active { cursor: grabbing; }

  .tube.shaking {
    animation: shakeTube 0.14s linear infinite;
  }
  @keyframes shakeTube {
    0% { transform: translateX(-50%) rotate(-6deg); }
    25% { transform: translateX(-52%) rotate(4deg); }
    50% { transform: translateX(-48%) rotate(-5deg); }
    75% { transform: translateX(-52%) rotate(6deg); }
    100% { transform: translateX(-50%) rotate(-4deg); }
  }

  .tube::before {
    content: '籤';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-brush);
    font-size: 26px;
    color: #3b2812;
    letter-spacing: 2px;
  }

  .sticks {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 260px;
    pointer-events: none;
    overflow: visible;
  }

  .stick {
    position: absolute;
    left: 50%;
    bottom: 10px;
    width: 6px;
    height: 240px;
    margin-left: -3px;
    background: linear-gradient(180deg, #d4b068 0%, #b8892a 40%, #8b6510 100%);
    border: 1px solid #5a3a08;
    border-radius: 2px;
    transform-origin: 50% 100%;
    transform: rotate(var(--ang, 0deg)) translateY(var(--dy, 0px));
    transition: transform 0.4s;
  }
  .stick::before {
    content: '';
    position: absolute;
    top: 0;
    left: -3px;
    right: -3px;
    height: 30px;
    background: linear-gradient(180deg, #c02a2a 0%, #8b1a1a 100%);
    border-radius: 2px 2px 0 0;
  }

  .stick.fallen {
    transform: translate(-50%, 200px) rotate(calc(var(--fall-ang, 45deg)));
    animation: fallOut 0.6s ease-out forwards;
  }
  @keyframes fallOut {
    0% { transform: rotate(0) translateY(0); }
    100% { transform: translate(var(--fall-x, -150%), 200px) rotate(var(--fall-ang, 45deg)); }
  }

  .result-stick {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(var(--res-rot, -20deg));
    width: 40px;
    height: 200px;
    background: linear-gradient(180deg, #d4b068 0%, #b8892a 40%, #8b6510 100%);
    border: 2px solid #5a3a08;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.5s;
    z-index: 10;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
  }
  .result-stick.show { opacity: 1; }
  .result-stick::before {
    content: '';
    position: absolute;
    top: 0;
    left: -2px;
    right: -2px;
    height: 24px;
    background: var(--tip, linear-gradient(180deg, #c02a2a 0%, #8b1a1a 100%));
    border-radius: 4px 4px 0 0;
  }
  .result-stick .mark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-brush);
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--mark-color, #3b2812);
    writing-mode: vertical-rl;
    white-space: nowrap;
  }
  .result-stick.approve { --tip: linear-gradient(180deg, #e9c36b 0%, #8b6510 100%); --mark-color: #5a3a08; }
  .result-stick.reject { --tip: linear-gradient(180deg, #1a1a1a 0%, #000 100%); --mark-color: #1a0f06; }

  .controls {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 20px;
  }

  .btn {
    padding: 10px 20px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold-hi);
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .btn:hover { background: rgba(232, 195, 107, 0.1); }

  .instruction {
    margin-top: 30px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">签筒</div><div class="en">Fortune Sticks</div></div>

<div class="stage">
  <div class="request req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
  </div>

  <div class="scene">
    <div class="sticks" id="sticks"></div>
    <div class="tube" id="tube"></div>
    <div class="base"></div>
    <div class="result-stick" id="result">
      <div class="mark" id="result-mark"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-shake">摇签</button>
  </div>
  <div class="instruction">摇签筒 · 上上签为准 · 下下签为驳</div>
</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  const sticksEl = document.getElementById('sticks');
  const tube = document.getElementById('tube');
  const result = document.getElementById('result');
  const resultMark = document.getElementById('result-mark');
  let committed = false;

  function setupSticks() {
    sticksEl.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const s = document.createElement('div');
      s.className = 'stick';
      s.style.setProperty('--ang', ((i - 4) * 2.5) + 'deg');
      s.style.setProperty('--dy', (Math.random() * 4 - 2) + 'px');
      sticksEl.appendChild(s);
    }
  }
  setupSticks();

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
  }
  loadReq();

  document.getElementById('btn-shake').addEventListener('click', shake);

  function shake() {
    if (committed) return;
    committed = true;
    tube.classList.add('shaking');
    sticksEl.querySelectorAll('.stick').forEach((s, i) => {
      s.style.setProperty('--dy', (Math.random() * 8 - 4) + 'px');
      s.style.transition = 'transform 0.1s';
    });

    setTimeout(() => {
      tube.classList.remove('shaking');
      // Pick one stick to fall out
      const lucky = Math.floor(Math.random() * 2); // 0 = approve, 1 = reject
      const verdict = lucky === 0 ? 'approve' : 'reject';
      const label = verdict === 'approve' ? '上上签 · 大吉' : '下下签 · 大凶';

      // Hide tube sticks
      sticksEl.querySelectorAll('.stick').forEach(s => s.style.opacity = '0');

      // Show result stick
      result.classList.add(verdict);
      resultMark.textContent = label;
      result.classList.add('show');

      setTimeout(() => window.cast(verdict), 1500);
    }, 1200);
  }

  window.nextRequest = () => {
    committed = false;
    result.classList.remove('show', 'approve', 'reject');
    resultMark.textContent = '';
    setupSticks();
    loadReq();
  };
</script>
</body>
</html>

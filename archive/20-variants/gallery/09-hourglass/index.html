<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0f06">
<title>沙漏 · Hourglass</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%E2%8C%9B%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background: radial-gradient(ellipse at center, #2a1a0f 0%, #0a0604 80%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    position: relative;
    text-align: center;
    width: 100%;
    max-width: 620px;
    padding: 20px;
  }

  .request {
    margin-bottom: 24px;
  }
  .request .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 8px; }
  .request .intent { font-family: var(--font-brush); font-size: 22px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 10px; }
  .request .reason { font-size: 13px; color: #b4a080; line-height: 1.7; font-style: italic; max-width: 460px; margin: 0 auto 10px; }

  .timer {
    font-family: var(--font-display);
    color: var(--gold-hi);
    letter-spacing: 4px;
    font-size: 12px;
    margin-bottom: 10px;
  }
  .timer .num { font-size: 28px; color: var(--parch-hi); }

  .glass-wrap {
    position: relative;
    width: 220px;
    height: 340px;
    margin: 20px auto;
    perspective: 800px;
  }

  .glass {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    animation: tilt 4s ease-in-out infinite alternate;
  }
  @keyframes tilt {
    0% { transform: rotateZ(-2deg); }
    100% { transform: rotateZ(2deg); }
  }

  .bulb {
    position: absolute;
    left: 50%;
    width: 160px;
    height: 140px;
    margin-left: -80px;
    border: 3px solid var(--gold);
    background:
      linear-gradient(180deg, rgba(232, 195, 107, 0.1) 0%, rgba(232, 195, 107, 0.05) 100%);
    box-shadow:
      inset -8px 0 16px rgba(255, 255, 255, 0.15),
      inset 8px 0 16px rgba(0, 0, 0, 0.4),
      0 4px 16px rgba(0, 0, 0, 0.4);
  }
  .bulb.top {
    top: 0;
    border-radius: 50% 50% 0 0 / 60% 60% 0 0;
    clip-path: polygon(0 0, 100% 0, 54% 100%, 46% 100%);
  }
  .bulb.bot {
    bottom: 0;
    border-radius: 0 0 50% 50% / 0 0 60% 60%;
    clip-path: polygon(46% 0, 54% 0, 100% 100%, 0 100%);
  }

  .cap {
    position: absolute;
    left: 50%;
    width: 200px;
    height: 14px;
    margin-left: -100px;
    background: linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 50%, #5a3a08 100%);
    border-radius: 4px;
    z-index: 3;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
  }
  .cap.top { top: -14px; }
  .cap.bot { bottom: -14px; }

  .pillar {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 8px;
    background: linear-gradient(180deg, var(--gold) 0%, #5a3a08 100%);
    border-radius: 2px;
  }
  .pillar.l { left: 6px; }
  .pillar.r { right: 6px; }

  .sand {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 140px;
    background: linear-gradient(180deg, #e9c36b 0%, #b8892a 100%);
  }
  .sand.top {
    width: 140px;
    height: var(--top-h, 80%);
    bottom: 4px;
    top: auto;
    clip-path: polygon(0 0, 100% 0, 52% 100%, 48% 100%);
    transition: height 0.2s linear;
  }
  .sand.bot {
    bottom: 0;
    width: 140px;
    height: var(--bot-h, 20%);
    clip-path: polygon(48% 0, 52% 0, 100% 100%, 0 100%);
    transition: height 0.2s linear;
  }

  .stream {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 4px;
    height: 40px;
    background: linear-gradient(180deg, #e9c36b, #b8892a);
    opacity: var(--stream-op, 1);
    transition: opacity 0.2s;
  }

  .btn-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 28px;
  }

  .btn {
    padding: 12px 26px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold-hi);
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .btn:hover { background: rgba(232, 195, 107, 0.1); }
  .btn.flip { border-color: var(--parch); }
  .btn .hot { font-family: var(--font-brush); font-size: 14px; letter-spacing: 3px; display: inline-block; margin-right: 6px; }

  .instruction {
    margin-top: 16px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">沙漏</div><div class="en">Hourglass</div></div>

<div class="stage">
  <div class="request req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
    <div><span class="req-risk" id="r-risk"></span></div>
  </div>

  <div class="timer">余沙 <span class="num" id="num">10</span> 刻</div>

  <div class="glass-wrap">
    <div class="glass">
      <div class="cap top"></div>
      <div class="bulb top">
        <div class="sand top" id="sand-top"></div>
      </div>
      <div class="bulb bot">
        <div class="sand bot" id="sand-bot"></div>
      </div>
      <div class="stream" id="stream"></div>
      <div class="cap bot"></div>
      <div class="pillar l"></div>
      <div class="pillar r"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" id="btn-flip"><span class="hot">翻</span>翻漏 · 驳</button>
    <button class="btn" id="btn-wait"><span class="hot">候</span>待沙尽 · 准</button>
  </div>
  <div class="instruction">沙尽前定 · 翻漏则驳 · 待尽则准</div>
</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  const sandTop = document.getElementById('sand-top');
  const sandBot = document.getElementById('sand-bot');
  const stream = document.getElementById('stream');
  const num = document.getElementById('num');
  let committed = false;
  let timeLeft = 10;
  let ticker;

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
    const risk = document.getElementById('r-risk');
    risk.textContent = '风险 · ' + window.riskLabel(r.risk);
    risk.className = 'req-risk ' + r.risk;
  }
  loadReq();

  function startTimer() {
    timeLeft = 10;
    num.textContent = timeLeft;
    clearInterval(ticker);
    ticker = setInterval(() => {
      if (committed) { clearInterval(ticker); return; }
      timeLeft--;
      num.textContent = timeLeft;
      const topH = Math.max(0, timeLeft / 10 * 100);
      const botH = 100 - topH;
      sandTop.style.setProperty('--top-h', topH + '%');
      sandBot.style.setProperty('--bot-h', botH * 0.55 + '%');
      stream.style.setProperty('--stream-op', timeLeft > 0 ? 1 : 0);
      if (timeLeft <= 0) {
        clearInterval(ticker);
        if (!committed) {
          committed = true;
          setTimeout(() => window.cast('approve'), 400);
        }
      }
    }, 600);
  }
  startTimer();

  document.getElementById('btn-flip').addEventListener('click', () => {
    if (committed) return;
    committed = true;
    clearInterval(ticker);
    const glass = document.querySelector('.glass');
    glass.style.transition = 'transform 0.8s cubic-bezier(0.2, 0.8, 0.3, 1)';
    glass.style.transform = 'rotateZ(180deg)';
    setTimeout(() => window.cast('reject'), 700);
  });

  document.getElementById('btn-wait').addEventListener('click', () => {
    if (committed) return;
    committed = true;
    clearInterval(ticker);
    sandTop.style.setProperty('--top-h', '0%');
    sandBot.style.setProperty('--bot-h', '55%');
    stream.style.setProperty('--stream-op', 0);
    setTimeout(() => window.cast('approve'), 400);
  });

  window.nextRequest = () => {
    committed = false;
    const glass = document.querySelector('.glass');
    glass.style.transition = '';
    glass.style.transform = '';
    startTimer();
    loadReq();
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0f06">
<title>钟磬 · Twin Bells</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%F0%9F%94%94%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background: radial-gradient(ellipse at center, #2a1a0f 0%, #0a0604 80%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    text-align: center;
    width: 100%;
    max-width: 720px;
    padding: 20px;
  }

  .request {
    margin-bottom: 32px;
  }
  .request .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 8px; }
  .request .intent { font-family: var(--font-brush); font-size: 22px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 10px; }
  .request .reason { font-size: 13px; color: #b4a080; line-height: 1.7; font-style: italic; max-width: 460px; margin: 0 auto 10px; }

  .temple {
    position: relative;
    display: flex;
    justify-content: center;
    gap: 80px;
    padding: 40px 20px;
  }

  .frame {
    position: absolute;
    top: 0;
    left: 10%;
    right: 10%;
    height: 20px;
    background: linear-gradient(180deg, #8b6510 0%, #3b2812 100%);
    border-radius: 2px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
  }

  .frame::before, .frame::after {
    content: '';
    position: absolute;
    top: 0;
    width: 14px;
    height: 400px;
    background: linear-gradient(180deg, #8b6510 0%, #3b2812 100%);
    border-radius: 2px;
  }
  .frame::before { left: -7px; }
  .frame::after { right: -7px; }

  .bell-wrap {
    position: relative;
    width: 140px;
    cursor: pointer;
    z-index: 2;
  }

  .rope {
    width: 2px;
    height: 60px;
    background: #5a3a08;
    margin: 0 auto;
  }

  .bell {
    position: relative;
    width: 140px;
    height: 160px;
    background:
      linear-gradient(180deg, #7a5510 0%, #b8892a 40%, #e9c36b 50%, #b8892a 70%, #5a3a08 100%);
    border-radius: 20px 20px 50% 50% / 20px 20px 40% 40%;
    box-shadow:
      inset -6px 0 14px rgba(0, 0, 0, 0.4),
      inset 6px 0 14px rgba(255, 220, 160, 0.2),
      0 12px 30px rgba(0, 0, 0, 0.6);
    transform-origin: 50% -40px;
    transition: transform 0.15s;
  }
  .bell::before {
    content: '';
    position: absolute;
    top: 14px;
    left: 50%;
    width: 60%;
    height: 80%;
    transform: translateX(-50%);
    border: 2px solid rgba(59, 40, 18, 0.4);
    border-radius: inherit;
    background: radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.1), transparent 60%);
  }
  .bell .char {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-brush);
    font-size: 48px;
    color: #3b2812;
    letter-spacing: 3px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
  }

  .clapper {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 30px;
    background: radial-gradient(ellipse at 30% 30%, #e9c36b, #5a3a08);
    border-radius: 50%;
    z-index: 3;
    pointer-events: none;
  }

  .bell-wrap.approve .bell { filter: drop-shadow(0 0 0 var(--gold-hi)); }
  .bell-wrap.reject .bell { background:
    linear-gradient(180deg, #3b2812 0%, #5a3a08 40%, #8b6510 50%, #5a3a08 70%, #1a0f06 100%);
  }
  .bell-wrap.reject .bell .char { color: #8b1a1a; }

  .bell-wrap.ringing .bell {
    animation: ring 0.8s cubic-bezier(0.4, 0, 0.6, 1);
  }
  @keyframes ring {
    0%, 100% { transform: rotate(0); }
    15% { transform: rotate(14deg); }
    35% { transform: rotate(-12deg); }
    55% { transform: rotate(8deg); }
    75% { transform: rotate(-4deg); }
  }

  .ring-wave {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 2px solid currentColor;
    pointer-events: none;
    opacity: 0;
  }
  .bell-wrap.approve .ring-wave { color: var(--gold-hi); }
  .bell-wrap.reject .ring-wave { color: var(--wax-hi); }
  .bell-wrap.ringing .ring-wave {
    animation: ringWave 1s ease-out;
  }
  @keyframes ringWave {
    0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.4); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
  }

  .bell-label {
    margin-top: 20px;
    font-family: var(--font-brush);
    font-size: 14px;
    letter-spacing: 3px;
    text-align: center;
  }
  .bell-wrap.approve .bell-label { color: var(--gold-hi); }
  .bell-wrap.reject .bell-label { color: var(--wax-hi); }

  .instruction {
    margin-top: 40px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
  }

  .bell-wrap:hover .bell {
    transform: translateY(-4px);
    transition: transform 0.2s;
  }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">钟磬</div><div class="en">Twin Bells</div></div>

<div class="stage">
  <div class="request req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
    <div><span class="req-risk" id="r-risk"></span></div>
  </div>

  <div class="temple">
    <div class="frame"></div>

    <div class="bell-wrap reject" data-kind="reject">
      <div class="rope"></div>
      <div class="bell"><div class="char">驳</div></div>
      <div class="clapper"></div>
      <div class="ring-wave"></div>
      <div class="bell-label">西钟 · Reject</div>
    </div>

    <div class="bell-wrap approve" data-kind="approve">
      <div class="rope"></div>
      <div class="bell"><div class="char">准</div></div>
      <div class="clapper"></div>
      <div class="ring-wave"></div>
      <div class="bell-label">东钟 · Approve</div>
    </div>
  </div>

  <div class="instruction">击钟一记 · 即下裁决</div>
</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  let committed = false;
  let audioCtx = null;

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function ring(freq) {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.5, now + 1.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(now + 1.3);
    } catch (e) {}
  }

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
    const risk = document.getElementById('r-risk');
    risk.textContent = '风险 · ' + window.riskLabel(r.risk);
    risk.className = 'req-risk ' + r.risk;
  }
  loadReq();

  document.querySelectorAll('.bell-wrap').forEach(w => {
    w.addEventListener('click', () => {
      if (committed) return;
      committed = true;
      const kind = w.getAttribute('data-kind');
      w.classList.add('ringing');
      ring(kind === 'approve' ? 660 : 220);
      setTimeout(() => window.cast(kind), 900);
    });
  });

  window.nextRequest = () => {
    committed = false;
    document.querySelectorAll('.bell-wrap').forEach(w => w.classList.remove('ringing'));
    loadReq();
  };
</script>
</body>
</html>

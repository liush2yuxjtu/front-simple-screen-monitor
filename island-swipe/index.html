<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#04080f">
<meta name="description" content="灵动岛 · Activity Monitor — swipe-based Dynamic Island screen monitor">
<title>灵动岛 · Activity Monitor</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='22' y='34' width='56' height='32' rx='16' fill='%2300e5ff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04080f;
    --surface: #0a1520;
    --cyan: #00e5ff;
    --lime: #76ff03;
    --red: #ff1744;
    --text: #e0f7fa;
    --muted: #4a6a7a;
    --border: #1a3a4a;
    --glass: rgba(10, 21, 32, 0.85);

    --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    --font-ui: 'Noto Sans SC', -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    touch-action: none;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,229,255,0.08), transparent),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(118,255,3,0.04), transparent);
    z-index: 0;
  }

  .phone {
    position: relative;
    width: min(430px, 92vw);
    height: min(932px, 92vh);
    max-height: 932px;
    border-radius: 58px;
    padding: 12px;
    background: linear-gradient(145deg, #1a2530 0%, #0a1018 50%, #1a2530 100%);
    box-shadow:
      0 0 0 2px #0d1a24,
      0 0 0 4px #1a3040,
      0 0 80px rgba(0,229,255,0.08),
      inset 0 0 40px rgba(0,229,255,0.03);
    z-index: 2;
    overflow: hidden;
  }

  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 46px;
    overflow: hidden;
    background: var(--surface);
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.008) 2px, rgba(0,229,255,0.008) 4px);
  }

  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 30px 8px;
    z-index: 5;
    pointer-events: none;
  }

  .status-time {
    font-family: var(--font-mono);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--cyan);
  }

  .status-right { display: flex; align-items: center; gap: 6px; }
  .status-right svg { width: 18px; height: 12px; fill: var(--cyan); opacity: 0.8; }

  .battery {
    width: 26px; height: 13px;
    border: 1px solid rgba(0,229,255,0.4);
    border-radius: 3.5px;
    padding: 1.2px;
    position: relative;
  }
  .battery::after {
    content: '';
    position: absolute;
    right: -3px; top: 3.5px;
    width: 2px; height: 5px;
    background: rgba(0,229,255,0.4);
    border-radius: 0 1px 1px 0;
  }
  .battery-fill { width: 80%; height: 100%; background: var(--cyan); border-radius: 1.5px; }

  .island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 37px;
    background: var(--bg);
    border-radius: 22px;
    z-index: 10;
    cursor: pointer;
    box-shadow: 0 0 0 1px rgba(0,229,255,0.2), 0 0 20px rgba(0,229,255,0.1), 0 2px 10px rgba(0,0,0,0.8);
    overflow: hidden;
    transition: width 0.55s cubic-bezier(0.32, 0.72, 0, 1), height 0.55s cubic-bezier(0.32, 0.72, 0, 1), border-radius 0.55s cubic-bezier(0.32, 0.72, 0, 1), top 0.55s cubic-bezier(0.32, 0.72, 0, 1);
    user-select: none;
  }
  .island:focus-visible {
    outline: none;
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.45),
      0 0 0 4px rgba(0,229,255,0.08),
      0 0 28px rgba(0,229,255,0.18),
      0 2px 10px rgba(0,0,0,0.8);
  }
  .island.dragging {
    transition: none;
  }

  .island.notif { width: 340px; height: 37px; border-radius: 22px; }
  .island.expanded { width: 370px; height: 480px; border-radius: 38px; top: 58px; box-shadow: 0 0 0 1px rgba(0,229,255,0.3), 0 0 30px rgba(0,229,255,0.15), 0 8px 40px rgba(0,0,0,0.6); }
  .island.confirmed { width: 200px; height: 37px; border-radius: 22px; }

  .island-content { position: absolute; inset: 0; display: flex; opacity: 0; pointer-events: none; transition: opacity 0.25s ease-out; }
  .island-content.visible { opacity: 1; pointer-events: auto; }

  .state-notif { padding: 0 16px; align-items: center; gap: 10px; }
  .notif-icon { width: 24px; height: 24px; border-radius: 6px; background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.25); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .notif-icon svg { width: 14px; height: 14px; fill: var(--cyan); }
  .notif-text { flex: 1; font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.3px; }
  .notif-tag { font-family: var(--font-mono); font-size: 9px; font-weight: 700; color: var(--cyan); letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.8; }

  .state-expanded { flex-direction: column; align-items: stretch; padding: 16px 18px 14px; gap: 12px; }
  .exp-header { display: flex; align-items: center; gap: 10px; }
  .exp-icon { width: 34px; height: 34px; border-radius: 8px; background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .exp-icon svg { width: 18px; height: 18px; fill: var(--cyan); }
  .exp-title-wrap { flex: 1; min-width: 0; }
  .exp-app { font-family: var(--font-mono); font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; }
  .exp-intent { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; margin-top: 2px; line-height: 1.3; }
  .exp-risk { font-family: var(--font-mono); font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .exp-risk.low { background: rgba(118,255,3,0.12); color: var(--lime); border: 1px solid rgba(118,255,3,0.25); }
  .exp-risk.med { background: rgba(255,193,7,0.12); color: #ffc107; border: 1px solid rgba(255,193,7,0.25); }
  .exp-risk.high { background: rgba(255,23,68,0.12); color: var(--red); border: 1px solid rgba(255,23,68,0.25); }

  .exp-screenshot { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #080f18; position: relative; border: 1px solid var(--border); }
  .exp-screenshot .mock { position: absolute; inset: 0; }
  .exp-reason { font-family: var(--font-mono); font-size: 11px; line-height: 1.55; color: var(--muted); letter-spacing: 0.2px; }

  .swipe-hint { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; padding: 0 2px; }
  .swipe-dir { display: flex; flex-direction: column; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .swipe-dir.left { color: var(--red); opacity: 0.8; }
  .swipe-dir.right { color: var(--lime); opacity: 0.8; }
  .swipe-arrow { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .swipe-arrow.left { background: rgba(255,23,68,0.15); border: 1.5px solid rgba(255,23,68,0.35); }
  .swipe-arrow.left svg { width: 16px; height: 16px; fill: var(--red); }
  .swipe-arrow.right { background: rgba(118,255,3,0.15); border: 1.5px solid rgba(118,255,3,0.35); }
  .swipe-arrow.right svg { width: 16px; height: 16px; fill: var(--lime); }
  .swipe-track { flex: 1; height: 4px; background: rgba(0,229,255,0.08); border-radius: 2px; margin: 0 12px; position: relative; }
  .swipe-track::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1px;
    height: 12px;
    transform: translate(-50%, -50%);
    background: rgba(0,229,255,0.22);
    box-shadow: 0 0 10px rgba(0,229,255,0.12);
  }
  .swipe-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border-radius: 50%; background: var(--text); box-shadow: 0 0 12px rgba(0,229,255,0.3); transition: left 0.05s, background 0.2s; left: 50%; }
  .island.dragging .swipe-thumb {
    transition: none;
    box-shadow:
      0 0 0 1px rgba(224,247,250,0.45),
      0 0 18px rgba(0,229,255,0.35);
  }

  .state-confirm { padding: 0 22px; gap: 10px; justify-content: center; align-items: center; }
  .state-confirm .check-glyph { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .state-confirm.allow .check-glyph { background: var(--lime); }
  .state-confirm.allow .check-glyph svg { fill: #000; width: 14px; height: 14px; }
  .state-confirm.block .check-glyph { background: var(--red); }
  .state-confirm.block .check-glyph svg { fill: #fff; width: 14px; height: 14px; }
  .state-confirm .verdict-text { font-family: var(--font-mono); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }

  .swipe-overlay { position: absolute; inset: 0; border-radius: inherit; opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 1; }
  .swipe-overlay.left { background: rgba(255,23,68,0.2); }
  .swipe-overlay.right { background: rgba(118,255,3,0.2); }
  .swipe-overlay.active.left, .swipe-overlay.active.right { opacity: 1; }

  .home { position: absolute; top: 180px; left: 0; right: 0; bottom: 30px; padding: 30px 28px; z-index: 2; display: flex; flex-direction: column; }
  .home-title { font-family: var(--font-mono); font-size: 13px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--cyan); text-align: center; text-shadow: 0 0 20px rgba(0,229,255,0.4); }
  .home-sub { text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 6px; text-transform: uppercase; }

  .tally-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 28px; }
  .tcell { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 12px; padding: 14px 10px; text-align: center; position: relative; overflow: hidden; }
  .tcell::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,229,255,0.3), transparent); }
  .tcell .num { font-family: var(--font-mono); font-size: 26px; font-weight: 700; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
  .tcell.allow .num { color: var(--lime); }
  .tcell.block .num { color: var(--red); }
  .tcell.total .num { color: var(--cyan); }
  .tcell .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; font-weight: 500; }

  .hint-card { margin-top: 22px; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .hint-card h4 { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .hint-steps { display: flex; flex-direction: column; gap: 7px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); line-height: 1.5; letter-spacing: 0.3px; }
  .hint-steps span { display: flex; align-items: center; gap: 8px; }
  .hint-num { width: 18px; height: 18px; border-radius: 4px; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2); color: var(--cyan); font-size: 9px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: var(--font-mono); }

  .history-list { margin-top: auto; display: flex; flex-direction: column; gap: 5px; max-height: 110px; overflow-y: auto; padding-top: 14px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .hrow { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: rgba(0,229,255,0.03); border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-mono); font-size: 11px; animation: hrowIn 0.3s ease-out; }
  @keyframes hrowIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .hrow .hmark { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .hrow.allow .hmark { background: var(--lime); box-shadow: 0 0 6px rgba(118,255,3,0.5); }
  .hrow.block .hmark { background: var(--red); box-shadow: 0 0 6px rgba(255,23,68,0.5); }
  .hrow .hlabel { flex: 1; color: var(--text); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
  .hrow .htime { color: var(--muted); font-size: 10px; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }

  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: rgba(0,229,255,0.3); border-radius: 999px; z-index: 5; }
  .back { position: fixed; top: 20px; left: 20px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); text-decoration: none; z-index: 100; padding: 8px 14px; background: rgba(0,229,255,0.05); border: 1px solid var(--border); border-radius: 999px; backdrop-filter: blur(20px); transition: color 0.2s, border-color 0.2s, background 0.2s; }
  .back:hover { color: var(--cyan); border-color: rgba(0,229,255,0.3); background: rgba(0,229,255,0.08); }

  .scene-browser { background: linear-gradient(180deg, #0d1520 0%, #101d2a 100%); }
  .scene-terminal { background: #050a10; }
  .scene-code { background: #0a1018; }
  .scene-chat { background: linear-gradient(180deg, #0a1520, #080f18); }
  .scene-doc { background: #0a0f14; }

  @media (max-width: 500px) {
    .phone { width: 100vw; height: 100vh; height: 100dvh; max-height: none; border-radius: 0; padding: 0; box-shadow: none; background: transparent; }
    .screen { border-radius: 0; }
    .home { padding: 24px 20px; }
    .home-title { font-size: 11px; letter-spacing: 3px; }
    .back { top: auto; bottom: 22px; left: 16px; font-size: 10px; padding: 7px 12px; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<a class="back" href="../">← Back</a>

<div class="phone">
  <div class="screen">

    <div class="status-bar">
      <span class="status-time" id="clock">09:41</span>
      <div class="status-right">
        <svg viewBox="0 0 18 12"><path d="M17 10 L 17 12 L 15 12 L 15 10 Z M 14 8 L 14 12 L 12 12 L 12 8 Z M 11 5 L 11 12 L 9 12 L 9 5 Z M 8 2 L 8 12 L 6 12 L 6 2 Z"/></svg>
        <svg viewBox="0 0 18 12"><path d="M9 2 C 6 2 4 4 2 6 L 3 7 C 5 5 7 4 9 4 C 11 4 13 5 15 7 L 16 6 C 14 4 12 2 9 2 Z M 9 6 C 7.5 6 6.5 7 5.5 8 L 6.5 9 C 7 8.5 8 8 9 8 C 10 8 11 8.5 11.5 9 L 12.5 8 C 11.5 7 10.5 6 9 6 Z M 9 9 A 1.2 1.2 0 0 0 9 11.4 A 1.2 1.2 0 0 0 9 9 Z"/></svg>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>

    <div class="island" id="island" role="button" tabindex="0" aria-label="Activity Monitor">
      <div class="swipe-overlay left" id="overlay-left"></div>
      <div class="swipe-overlay right" id="overlay-right"></div>

      <div class="island-content state-notif" id="state-notif">
        <div class="notif-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <div class="notif-text" id="notif-intent">—</div>
        <div class="notif-tag">MON</div>
      </div>

      <div class="island-content state-expanded" id="state-expanded">
        <div class="exp-header">
          <div class="exp-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          </div>
          <div class="exp-title-wrap">
            <div class="exp-app" id="exp-app">—</div>
            <div class="exp-intent" id="exp-intent">—</div>
          </div>
          <div class="exp-risk" id="exp-risk">—</div>
        </div>
        <div class="exp-screenshot">
          <div class="mock" id="exp-mock"></div>
        </div>
        <div class="exp-reason" id="exp-reason">—</div>

        <div class="swipe-hint">
          <div class="swipe-dir left">
            <div class="swipe-arrow left">
              <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </div>
            <span>BLOCK</span>
          </div>
          <div class="swipe-track">
            <div class="swipe-thumb" id="swipe-thumb"></div>
          </div>
          <div class="swipe-dir right">
            <div class="swipe-arrow right">
              <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <span>ALLOW</span>
          </div>
        </div>
      </div>

      <div class="island-content state-confirm" id="state-confirm">
        <div class="check-glyph" id="confirm-glyph">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <div class="verdict-text" id="confirm-text">ALLOWED</div>
      </div>
    </div>

    <main class="home">
      <div class="home-title">灵动岛 · Activity Monitor</div>
      <div class="home-sub">Swipe to decide · Left = BLOCK · Right = ALLOW</div>

      <div class="tally-row">
        <div class="tcell allow">
          <div class="num" id="tally-allow">0</div>
          <div class="lbl">ALLOWED</div>
        </div>
        <div class="tcell block">
          <div class="num" id="tally-block">0</div>
          <div class="lbl">BLOCKED</div>
        </div>
        <div class="tcell total">
          <div class="num" id="tally-total">0</div>
          <div class="lbl">TOTAL</div>
        </div>
      </div>

      <div class="hint-card">
        <h4>How it works</h4>
        <div class="hint-steps">
          <span><span class="hint-num">1</span>Activity detected → pill expands</span>
          <span><span class="hint-num">2</span>Swipe LEFT or press A / ← → BLOCK</span>
          <span><span class="hint-num">3</span>Swipe RIGHT or press D / → → ALLOW</span>
        </div>
      </div>

      <div class="history-list" id="history"></div>
    </main>

    <div class="home-indicator"></div>
  </div>
</div>

<script>
  const REQUESTS = [
    {
      intent: 'Open YouTube',
      reasonShort: 'Dock activity + afternoon time',
      reason: 'Mouse near Chrome dock icon. Likely wants video. Low risk.',
      app: 'Chrome', risk: 'low', scene: 'browser',
      mock: `<div style="position:absolute;top:0;left:0;right:0;height:10px;background:#0d2030;"></div>
        <div style="position:absolute;top:12px;left:6px;right:6px;">
          <div style="background:#0d2030;padding:3px;font-family:monospace;font-size:9px;color:#4a8a9a;">youtube.com</div>
          <div style="margin-top:4px;display:grid;grid-template-columns:1fr 1fr;gap:2px;">
            <div style="background:#0d2030;height:20px;"></div>
            <div style="background:#0d2030;height:20px;"></div>
          </div>
        </div>`
    },
    {
      intent: 'rm -rf node_modules',
      reasonShort: 'Terminal delete command — not executed',
      reason: 'Terminal cursor at project root. Command typed but Enter not pressed. High risk.',
      app: 'iTerm2', risk: 'high', scene: 'terminal',
      mock: `<div style="position:absolute;inset:0;padding:8px;font-family:monospace;font-size:9px;color:#4a8a9a;line-height:1.6;background:#050a10;">
        <div>~/app $ ls</div>
        <div style="color:#2a4a5a;">node_modules/ src/</div>
        <div>~/app $ <span style="background:rgba(255,23,68,0.3);color:#ff1744;padding:0 2px;border-radius:2px;">rm -rf node_modules</span></div>
      </div>`
    },
    {
      intent: 'Compose mail to Anthropic',
      reasonShort: 'Draft with repeated greeting edits',
      reason: 'To: field filled. Body rewritten several times. Seeking right tone.',
      app: 'Mail', risk: 'med', scene: 'doc',
      mock: `<div style="position:absolute;inset:0;padding:8px;font-size:10px;color:#4a6a7a;background:#080f14;">
        <div style="border-bottom:1px solid #1a3a4a;padding:0 0 3px;margin-bottom:4px;font-family:monospace;"><span style="color:#4a6a7a;">To:</span> recruiting@anthropic.com</div>
        <div style="color:#3a5a6a;">Dear hiring team,</div>
        <div style="color:#2a4a5a;font-style:italic;margin-top:2px;">| _</div>
      </div>`
    },
    {
      intent: 'Edit auth.ts',
      reasonShort: 'Token check incomplete, session paused',
      reason: 'Edit stopped at line 42 token check. 30 min elapsed. Resume needed.',
      app: 'VS Code', risk: 'low', scene: 'code',
      mock: `<div style="position:absolute;inset:0;padding:8px;font-family:monospace;font-size:9px;color:#4a6a7a;line-height:1.6;background:#080f14;">
        <div><span style="color:#6a8a9a;">function</span> <span style="color:#00e5ff;">verify</span>(t){</div>
        <div>&nbsp;&nbsp;<span style="color:#6a8a9a;">if</span>(!t) <span style="color:#6a8a9a;">return null</span>;</div>
        <div style="background:rgba(0,229,255,0.05);">&nbsp;&nbsp;<span style="color:#3a5a6a;">// cursor here</span></div>
      </div>`
    },
    {
      intent: 'Slack DM to colleague',
      reasonShort: 'Typing "should we after work" → paused',
      reason: 'Typed "should we after work together..." then stopped for 3 min. Hesitating.',
      app: 'Slack', risk: 'med', scene: 'chat',
      mock: `<div style="position:absolute;inset:0;padding:8px;font-size:9px;color:#4a6a7a;background:#080f18;">
        <div style="color:#3a5a6a;font-family:monospace;">#dm · @liuwei</div>
        <div style="margin-top:8px;background:#0a1520;padding:5px;border:1px solid #1a3a4a;border-radius:3px;font-family:monospace;">
          should we after work together<span style="background:rgba(0,229,255,0.2);color:#00e5ff;">|</span>
        </div>
      </div>`
    },
    {
      intent: 'Tweet about unreleased strategy',
      reasonShort: 'Draft 180 chars — company strategy',
      reason: 'Tweet box at 180 chars. Mentions unannounced company strategy. Alert: potential leak.',
      app: 'Twitter', risk: 'high', scene: 'browser',
      mock: `<div style="position:absolute;inset:0;padding:8px;font-size:9px;color:#4a6a7a;background:#060c12;">
        <div style="background:#0a1520;padding:5px;border-radius:4px;font-family:monospace;border:1px solid rgba(255,23,68,0.3);">Heard our Q${''}next quarter strategy... [182 chars]</div>
        <div style="text-align:right;margin-top:4px;color:#00e5ff;font-family:monospace;font-size:9px;">Tweet →</div>
      </div>`
    }
  ];

  const state = { current: null, allowed: 0, blocked: 0, locked: false, timer: null, islandState: 'compact' };

  const island = document.getElementById('island');
  const stateNotif = document.getElementById('state-notif');
  const stateExp = document.getElementById('state-expanded');
  const stateConfirm = document.getElementById('state-confirm');
  const notifIntent = document.getElementById('notif-intent');
  const expApp = document.getElementById('exp-app');
  const expIntent = document.getElementById('exp-intent');
  const expRisk = document.getElementById('exp-risk');
  const expMock = document.getElementById('exp-mock');
  const expReason = document.getElementById('exp-reason');
  const confirmGlyph = document.getElementById('confirm-glyph');
  const confirmText = document.getElementById('confirm-text');
  const historyEl = document.getElementById('history');
  const clockEl = document.getElementById('clock');
  const swipeThumb = document.getElementById('swipe-thumb');
  const overlayLeft = document.getElementById('overlay-left');
  const overlayRight = document.getElementById('overlay-right');

  let touchStartX = 0, touchCurrentX = 0, isDragging = false;
  const SWIPE_THRESHOLD = 90;

  function tickClock() {
    const d = new Date();
    clockEl.textContent = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  tickClock();
  setInterval(tickClock, 60000);

  function vibrate(p) { if (vibrate.enabled && 'vibrate' in navigator) { try { navigator.vibrate(p); } catch(_) {} } }
  vibrate.enabled = true;

  function setIslandState(s, data) {
    stateNotif.classList.remove('visible');
    stateExp.classList.remove('visible');
    stateConfirm.classList.remove('visible');
    island.classList.remove('notif', 'expanded', 'confirmed');
    state.islandState = s;

    if (s === 'compact') resetSwipeThumb();
    else if (s === 'notif') {
      island.classList.add('notif');
      setTimeout(() => stateNotif.classList.add('visible'), 200);
      notifIntent.textContent = data.intent;
    } else if (s === 'expanded') {
      island.classList.add('expanded');
      setTimeout(() => stateExp.classList.add('visible'), 200);
      expApp.textContent = data.app;
      expIntent.textContent = data.intent;
      expRisk.textContent = { low: 'LOW', med: 'MED', high: 'HIGH' }[data.risk];
      expRisk.className = 'exp-risk ' + data.risk;
      expMock.innerHTML = data.mock;
      expMock.className = 'mock scene-' + data.scene;
      expReason.textContent = data.reason;
      resetSwipeThumb();
    } else if (s === 'confirmed-allow') {
      island.classList.add('confirmed');
      stateConfirm.className = 'island-content state-confirm allow';
      confirmText.textContent = 'ALLOWED';
      setTimeout(() => stateConfirm.classList.add('visible'), 150);
    } else if (s === 'confirmed-block') {
      island.classList.add('confirmed');
      stateConfirm.className = 'island-content state-confirm block';
      confirmText.textContent = 'BLOCKED';
      setTimeout(() => stateConfirm.classList.add('visible'), 150);
    }
  }

  function resetSwipeThumb() {
    swipeThumb.style.left = '50%';
    swipeThumb.style.background = '#e0f7fa';
    overlayLeft.classList.remove('active');
    overlayRight.classList.remove('active');
  }

  function summon() {
    if (state.current) return;
    const r = REQUESTS[Math.floor(Math.random() * REQUESTS.length)];
    state.current = r;
    setIslandState('notif', { intent: r.intent });
    setTimeout(() => { if (state.islandState === 'notif') expand(); }, 1200);
  }

  function expand(fromUserGesture = false) {
    if (!state.current) return;
    if (state.islandState !== 'notif' && state.islandState !== 'compact') return;
    if (fromUserGesture) vibrate(10);
    setIslandState('expanded', state.current);
  }

  function collapseToNotif() {
    if (!state.current) return;
    setIslandState('notif', { intent: state.current.intent });
  }

  function allow() {
    if (state.locked || !state.current) return;
    state.locked = true;
    vibrate(40);
    state.allowed++;
    pushHistory('allow', state.current.intent);
    updateTally();
    setIslandState('confirmed-allow');
    setTimeout(() => { setIslandState('compact'); state.current = null; state.locked = false; scheduleNext(5000); }, 1600);
  }

  function block() {
    if (state.locked || !state.current) return;
    state.locked = true;
    vibrate([80, 40, 80]);
    state.blocked++;
    pushHistory('block', state.current.intent);
    updateTally();
    setIslandState('confirmed-block');
    setTimeout(() => { setIslandState('compact'); state.current = null; state.locked = false; scheduleNext(5000); }, 1600);
  }

  function pushHistory(kind, intent) {
    const row = document.createElement('div');
    row.className = 'hrow ' + kind;
    const tm = new Date().toLocaleTimeString('en', { hour12: false });
    row.innerHTML = `<span class="hmark"></span><span class="hlabel">${intent}</span><span class="htime">${tm}</span>`;
    historyEl.prepend(row);
    while (historyEl.children.length > 4) historyEl.removeChild(historyEl.lastElementChild);
  }

  function updateTally() {
    document.getElementById('tally-allow').textContent = state.allowed;
    document.getElementById('tally-block').textContent = state.blocked;
    document.getElementById('tally-total').textContent = state.allowed + state.blocked;
  }

  function scheduleNext(ms) { clearTimeout(state.timer); state.timer = setTimeout(summon, ms); }

  function onDragStart(clientX) {
    if (state.islandState !== 'expanded' || state.locked) return;
    isDragging = true;
    island.classList.add('dragging');
    touchStartX = clientX;
    touchCurrentX = clientX;
  }
  function onDragMove(clientX) {
    if (!isDragging) return;
    touchCurrentX = clientX;
    const delta = touchCurrentX - touchStartX;
    const clampedDelta = Math.max(-island.offsetWidth * 0.4, Math.min(island.offsetWidth * 0.4, delta));
    const percent = 50 + (clampedDelta / island.offsetWidth) * 100;
    swipeThumb.style.left = Math.max(5, Math.min(95, percent)) + '%';
    if (delta < -30) { swipeThumb.style.background = 'var(--red)'; overlayLeft.classList.add('active'); overlayRight.classList.remove('active'); }
    else if (delta > 30) { swipeThumb.style.background = 'var(--lime)'; overlayRight.classList.add('active'); overlayLeft.classList.remove('active'); }
    else { swipeThumb.style.background = '#e0f7fa'; overlayLeft.classList.remove('active'); overlayRight.classList.remove('active'); }
  }
  function onDragEnd() {
    if (!isDragging) return;
    isDragging = false;
    island.classList.remove('dragging');
    const delta = touchCurrentX - touchStartX;
    if (delta < -SWIPE_THRESHOLD) block();
    else if (delta > SWIPE_THRESHOLD) allow();
    else resetSwipeThumb();
  }

  island.addEventListener('touchstart', (e) => { e.preventDefault(); onDragStart(e.touches[0].clientX); }, { passive: false });
  island.addEventListener('touchmove', (e) => { e.preventDefault(); onDragMove(e.touches[0].clientX); }, { passive: false });
  island.addEventListener('touchend', (e) => { e.preventDefault(); onDragEnd(); }, { passive: false });
  island.addEventListener('mousedown', (e) => { onDragStart(e.clientX); });
  document.addEventListener('mousemove', (e) => { if (isDragging) onDragMove(e.clientX); });
  document.addEventListener('mouseup', () => { if (isDragging) onDragEnd(); });
  island.addEventListener('click', (e) => { e.stopPropagation(); if (state.islandState === 'notif') expand(true); });
  document.addEventListener('click', () => { if (state.islandState === 'expanded') collapseToNotif(); });

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (!state.current) { if (k === ' ') { e.preventDefault(); clearTimeout(state.timer); summon(); } return; }
    if (state.islandState === 'notif' && (k === 'enter' || k === ' ')) { e.preventDefault(); expand(true); }
    else if (state.islandState === 'expanded') {
      if (k === 'arrowleft' || k === 'a') block();
      else if (k === 'arrowright' || k === 'd') allow();
      else if (k === 'escape') collapseToNotif();
    }
  });

  island.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); island.click(); } });

  scheduleNext(1800);
</script>

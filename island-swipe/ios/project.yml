name: ActivityMonitorApp
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  ActivityMonitorApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ActivityMonitorApp/ActivityMonitorApp
        excludes:
          - Resources
    resources:
      - path: ActivityMonitorApp/ActivityMonitorApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ActivityMonitorApp
        PRODUCT_NAME: ActivityMonitorApp
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: YES

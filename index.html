<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a0f06">
<meta name="description" content="御前决策殿 · 屏察御史 · A medieval parchment UI for reviewing screen-monitor AI requests.">
<title>御前决策 · Royal Decree</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%F0%9F%91%91%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --parch-1: #f2e1b8;
    --parch-2: #e4c98a;
    --parch-3: #c9a35a;
    --parch-shadow: #6b4a1f;
    --ink: #2b1a08;
    --ink-soft: #5a3a18;
    --wax: #8b1a1a;
    --wax-hi: #c02a2a;
    --wax-lo: #3b0808;
    --gold: #b8892a;
    --gold-hi: #e9c36b;
    --ember: #ff7a2a;
    --ash: #2a2520;

    /* Chinese font stacks — cross-platform fallback */
    --font-brush: 'Ma Shan Zheng', 'Noto Serif SC', 'Songti SC', 'STKaiti', 'KaiTi', 'DFKai-SB', 'Microsoft YaHei', 'PingFang SC', serif;
    --font-display: 'Cinzel', 'Trajan Pro', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', serif;
    --font-body: 'Noto Serif SC', 'Source Han Serif SC', 'Cormorant Garamond', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Heiti SC', 'STHeiti', 'SimSun', serif;
    --font-ui: 'Cinzel', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font-body);
    color: var(--ink);
    overflow: hidden;
    background: #1a0f06;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern" 1, "palt" 1;
  }

  body { overflow-x: hidden; }

  /* CJK-friendly line breaking */
  .salutation, .plea, .plea-sub,
  .brief .intent, .brief .reason,
  .decree-title, .title-cn, .chronicle-sub, .queue-sub,
  .ledger-text, .timer-sub, .decree-badge {
    word-break: keep-all;
    overflow-wrap: break-word;
    line-break: strict;
  }

  /* Prevent iOS auto text-size inflate */
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  button { -webkit-tap-highlight-color: transparent; }

  /* Stone wall backdrop */
  body {
    background:
      radial-gradient(ellipse at top, #3b2812 0%, #1a0f06 60%, #0a0604 100%),
      repeating-linear-gradient(90deg, #2a1a0a 0 60px, #1a0f06 60px 120px);
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.4) 0 1px, transparent 2px),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.4) 0 1px, transparent 2px),
      radial-gradient(circle at 50% 20%, rgba(0,0,0,0.3) 0 1px, transparent 2px);
    background-size: 60px 60px, 90px 90px, 120px 120px;
    pointer-events: none;
    opacity: 0.6;
  }

  /* Torch glow corners */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 8% 12%, rgba(255,140,40,0.25), transparent 22%),
      radial-gradient(circle at 92% 12%, rgba(255,140,40,0.25), transparent 22%),
      radial-gradient(circle at 50% 100%, rgba(255,160,60,0.15), transparent 30%);
    pointer-events: none;
    animation: flicker 4s ease-in-out infinite;
  }

  @keyframes flicker {
    0%,100% { opacity: 0.85; }
    25% { opacity: 1; }
    50% { opacity: 0.75; }
    75% { opacity: 0.95; }
  }

  .stage {
    position: relative;
    height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    grid-template-rows: 80px 1fr 60px;
    gap: 24px;
    padding: 24px;
    z-index: 1;
  }

  /* Header */
  .herald {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }

  .crest {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .crest-mark {
    width: 56px;
    height: 56px;
    filter: drop-shadow(0 0 12px rgba(232,195,107,0.4));
  }

  .title-en {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 8px;
    color: var(--gold-hi);
    text-transform: uppercase;
  }

  .title-cn {
    font-family: var(--font-brush);
    font-size: 28px;
    color: var(--gold-hi);
    letter-spacing: 4px;
    margin-top: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  .reign {
    text-align: right;
    font-family: var(--font-display);
    color: var(--gold-hi);
    font-size: 12px;
    letter-spacing: 3px;
  }

  .reign .date {
    font-family: var(--font-body);
    font-size: 16px;
    margin-top: 4px;
    color: #d4b86a;
  }

  /* Left chronicle */
  .chronicle {
    background: linear-gradient(180deg, rgba(30,20,10,0.7), rgba(10,6,3,0.7));
    border: 1px solid rgba(184,137,42,0.3);
    border-radius: 2px;
    padding: 20px;
    overflow-y: auto;
    position: relative;
  }

  .chronicle::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(90deg,
        transparent 0 14px,
        rgba(184,137,42,0.05) 14px 15px);
    pointer-events: none;
  }

  .chronicle-title {
    font-family: var(--font-display);
    color: var(--gold-hi);
    font-size: 11px;
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .chronicle-sub {
    font-family: var(--font-brush);
    color: var(--gold-hi);
    font-size: 18px;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(184,137,42,0.25);
    padding-bottom: 12px;
  }

  .ledger-item {
    padding: 12px 0;
    border-bottom: 1px dashed rgba(184,137,42,0.15);
    font-size: 13px;
    color: #c9b896;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeInLedger 0.6s ease-out;
  }

  @keyframes fadeInLedger {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ledger-glyph {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ledger-glyph.seal {
    color: var(--wax-hi);
    font-size: 16px;
  }

  .ledger-glyph.ash {
    color: #6a5a4a;
    font-size: 14px;
  }

  .ledger-text { flex: 1; line-height: 1.4; }
  .ledger-time { font-size: 10px; color: #7a6a50; margin-top: 2px; letter-spacing: 1px; }

  .empty-ledger {
    text-align: center;
    color: #6a5a4a;
    font-style: italic;
    padding: 40px 0;
    font-size: 13px;
  }

  /* Center scroll */
  .scroll-stage {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    perspective: 1200px;
  }

  .scroll {
    width: 92%;
    max-width: 640px;
    min-height: 520px;
    position: relative;
    transform-style: preserve-3d;
    animation: unfurl 1.2s cubic-bezier(0.22, 0.9, 0.3, 1.2);
    transition: transform 0.22s cubic-bezier(0.2, 0.8, 0.3, 1), opacity 0.22s ease-out;
    touch-action: pan-y;
  }

  .scroll.dragging { transition: none; }

  /* Swipe affordance glow on edges during drag */
  .scroll.drag-right .parchment { box-shadow: inset 0 0 80px rgba(160,24,24,0.5), inset 0 0 20px rgba(107,74,31,0.25), 0 30px 60px rgba(0,0,0,0.7); }
  .scroll.drag-left  .parchment { box-shadow: inset 0 0 80px rgba(196,74,24,0.55), inset 0 0 20px rgba(107,74,31,0.25), 0 30px 60px rgba(0,0,0,0.7); }

  @keyframes unfurl {
    0% { transform: rotateX(-70deg) translateY(-200px) scale(0.6); opacity: 0; }
    60% { opacity: 1; }
    100% { transform: rotateX(0) translateY(0) scale(1); opacity: 1; }
  }

  .scroll.burning {
    animation: burnAway 1.6s ease-in forwards;
  }

  @keyframes burnAway {
    0% { filter: brightness(1); transform: rotate(0) scale(1); opacity: 1; }
    20% { filter: brightness(1.2) sepia(0.4); }
    45% { filter: brightness(0.8) sepia(0.8) hue-rotate(-20deg); transform: rotate(-2deg) scale(0.98); }
    75% { filter: brightness(0.3) sepia(1) contrast(2); transform: rotate(3deg) scale(0.92) translateY(20px); opacity: 0.6; }
    100% { filter: brightness(0) sepia(1); transform: rotate(6deg) scale(0.7) translateY(120px); opacity: 0; }
  }

  .scroll.sealed { animation: sealedBow 0.6s ease-out; }

  @keyframes sealedBow {
    0% { transform: scale(1); }
    50% { transform: scale(1.02) translateY(-4px); }
    100% { transform: scale(1); }
  }

  /* Scroll rollers (top and bottom) */
  .roller {
    position: absolute;
    left: -14px;
    right: -14px;
    height: 28px;
    background:
      linear-gradient(180deg, #5a3a15 0%, #8b5a20 40%, #5a3a15 100%);
    border-radius: 14px;
    box-shadow:
      inset 0 2px 4px rgba(255,220,150,0.3),
      inset 0 -3px 6px rgba(0,0,0,0.5),
      0 4px 18px rgba(0,0,0,0.6);
  }

  .roller::before,
  .roller::after {
    content: '';
    position: absolute;
    top: -6px;
    width: 28px;
    height: 40px;
    background: radial-gradient(ellipse at 30% 40%, #c69848, #7a5020 70%);
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.6);
  }

  .roller::before { left: -8px; }
  .roller::after { right: -8px; }

  .roller.top { top: -14px; }
  .roller.bottom { bottom: -14px; }

  /* Parchment body */
  .parchment {
    background:
      radial-gradient(ellipse at 20% 10%, rgba(107, 74, 31, 0.15), transparent 40%),
      radial-gradient(ellipse at 80% 90%, rgba(107, 74, 31, 0.18), transparent 45%),
      radial-gradient(ellipse at 50% 50%, var(--parch-1) 0%, var(--parch-2) 60%, var(--parch-3) 100%);
    padding: 60px 54px 70px;
    margin: 10px 0;
    position: relative;
    box-shadow:
      inset 0 0 80px rgba(107,74,31,0.35),
      inset 0 0 20px rgba(107,74,31,0.25),
      0 30px 60px rgba(0,0,0,0.7);
    min-height: 500px;
  }

  /* Stains and texture */
  .parchment::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 25%, rgba(107,74,31,0.12) 0 8px, transparent 40px),
      radial-gradient(circle at 85% 15%, rgba(107,74,31,0.1) 0 6px, transparent 30px),
      radial-gradient(circle at 30% 80%, rgba(107,74,31,0.08) 0 10px, transparent 50px),
      radial-gradient(circle at 70% 65%, rgba(107,74,31,0.1) 0 5px, transparent 28px);
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  /* Paper noise */
  .parchment::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-radial-gradient(circle at 12% 8%, rgba(60,40,10,0.04) 0 1px, transparent 2px 4px),
      repeating-radial-gradient(circle at 70% 40%, rgba(60,40,10,0.04) 0 1px, transparent 2px 5px),
      repeating-radial-gradient(circle at 40% 75%, rgba(60,40,10,0.04) 0 1px, transparent 2px 4px);
    pointer-events: none;
  }

  /* Torn edges */
  .parchment {
    clip-path: polygon(
      0% 4%, 3% 2%, 8% 4%, 15% 1%, 22% 3%, 30% 1%, 38% 3%, 46% 1%,
      54% 3%, 62% 1%, 70% 3%, 78% 1%, 85% 3%, 92% 1%, 97% 3%, 100% 4%,
      100% 96%, 97% 98%, 92% 96%, 85% 99%, 78% 97%, 70% 99%, 62% 97%,
      54% 99%, 46% 97%, 38% 99%, 30% 97%, 22% 99%, 15% 97%, 8% 99%,
      3% 97%, 0% 96%
    );
  }

  .scroll-head {
    text-align: center;
    margin-bottom: 26px;
    position: relative;
  }

  .decree-badge {
    display: inline-block;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 10px;
    letter-spacing: 5px;
    color: #7a3a18;
    padding: 4px 16px;
    border: 1px solid rgba(122,58,24,0.4);
    border-radius: 2px;
    margin-bottom: 12px;
  }

  .decree-title {
    font-family: var(--font-brush);
    font-size: 36px;
    color: var(--ink);
    letter-spacing: 6px;
    line-height: 1.2;
  }

  .decree-hr {
    width: 60%;
    height: 18px;
    margin: 16px auto 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 18'><path d='M0 9 Q 50 2, 100 9 T 200 9' stroke='%23703a18' fill='none' stroke-width='1'/><circle cx='100' cy='9' r='3' fill='%23703a18'/><path d='M100 3 L 103 9 L 100 15 L 97 9 Z' fill='%23703a18'/></svg>");
    background-repeat: no-repeat;
    background-size: contain;
    background-position: center;
    opacity: 0.7;
  }

  /* Body of the request */
  .salutation {
    font-family: var(--font-body);
    font-size: 18px;
    color: var(--ink-soft);
    text-align: center;
    margin-bottom: 18px;
    letter-spacing: 2px;
  }

  .observation {
    display: grid;
    grid-template-columns: 168px 1fr;
    gap: 22px;
    margin: 18px 0 22px;
    align-items: start;
  }

  .snapshot {
    aspect-ratio: 16/10;
    border: 3px solid #7a4a1a;
    box-shadow:
      inset 0 0 8px rgba(0,0,0,0.4),
      0 4px 12px rgba(0,0,0,0.35);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    background: #1a1a1a;
  }

  .snapshot-frame {
    position: absolute;
    inset: 0;
    padding: 6px;
    font-family: monospace;
    font-size: 8px;
    color: rgba(255,255,255,0.5);
  }

  .snapshot-caption {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -22px;
    font-size: 11px;
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
    letter-spacing: 1px;
  }

  .brief h3 {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 4px;
    color: #7a3a18;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .brief .intent {
    font-family: var(--font-brush);
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  .brief .reason {
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink-soft);
    font-family: var(--font-body);
  }

  .meta-row {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    flex-wrap: wrap;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 2px;
    color: #7a3a18;
  }

  .meta-chip {
    padding: 3px 10px;
    border: 1px solid rgba(122,58,24,0.35);
    border-radius: 1px;
  }

  .meta-chip.risk-high { border-color: var(--wax); color: var(--wax); }
  .meta-chip.risk-med { border-color: #8b6818; color: #8b6818; }
  .meta-chip.risk-low { border-color: #3a5a18; color: #3a5a18; }

  /* Royal signature block */
  .plea {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px dashed rgba(122,58,24,0.3);
    font-family: var(--font-brush);
    font-size: 20px;
    color: var(--ink);
    text-align: right;
    letter-spacing: 4px;
    line-height: 1.4;
  }

  .plea-sub {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* Actions */
  .verdict {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 32px;
    position: relative;
  }

  .verdict-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform 0.2s ease;
    position: relative;
  }

  .verdict-btn:hover { transform: translateY(-4px); }
  .verdict-btn:active { transform: translateY(0); }

  .verdict-icon {
    width: 54px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
  }

  .verdict-label {
    font-family: var(--font-brush);
    font-size: 20px;
    letter-spacing: 6px;
  }

  .verdict-hint {
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: 3px;
    opacity: 0.7;
  }

  .btn-approve { color: var(--wax); }
  .btn-approve .verdict-icon circle.wax { fill: var(--wax); }

  .btn-reject { color: #3a2010; }
  .btn-reject .verdict-icon path.flame { fill: #c44a18; }

  /* Wax seal overlay when stamped */
  .wax-seal {
    position: absolute;
    right: 54px;
    bottom: 110px;
    width: 140px;
    height: 140px;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.2) rotate(-25deg);
    transform-origin: center;
  }

  .wax-seal.active {
    animation: stampDrop 0.7s cubic-bezier(0.4, 1.6, 0.5, 1) forwards;
  }

  @keyframes stampDrop {
    0% { opacity: 0; transform: scale(3) rotate(-40deg); }
    70% { opacity: 1; transform: scale(0.9) rotate(-8deg); }
    85% { transform: scale(1.08) rotate(-6deg); }
    100% { opacity: 1; transform: scale(1) rotate(-7deg); }
  }

  .wax-splat {
    position: absolute;
    inset: 0;
    filter: drop-shadow(0 4px 8px rgba(80,0,0,0.5));
  }

  /* Burning overlay */
  .embers {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .ember {
    position: absolute;
    bottom: 0;
    width: 4px;
    height: 4px;
    background: radial-gradient(circle, #ffdb8a 0%, var(--ember) 40%, transparent 70%);
    border-radius: 50%;
    opacity: 0;
  }

  .scroll.burning .ember {
    animation: emberRise 1.4s ease-out forwards;
  }

  @keyframes emberRise {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    30% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-400px) translateX(var(--drift, 20px)) scale(1.2); }
  }

  .burn-edge {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at bottom, rgba(120,30,0,0.9) 0%, transparent 30%),
      linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 30%);
    opacity: 0;
    mix-blend-mode: multiply;
  }

  .scroll.burning .burn-edge {
    animation: charPaper 1.6s ease-in forwards;
  }

  @keyframes charPaper {
    0% { opacity: 0; }
    50% { opacity: 0.8; }
    100% { opacity: 1; }
  }

  /* Right: timer + queue */
  .watch-tower {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .timer-card {
    background: linear-gradient(180deg, rgba(30,20,10,0.7), rgba(10,6,3,0.7));
    border: 1px solid rgba(184,137,42,0.3);
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .timer-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(232,195,107,0.08), transparent 60%);
    pointer-events: none;
  }

  .timer-title {
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold-hi);
    margin-bottom: 10px;
  }

  .timer-ring {
    position: relative;
    width: 130px;
    height: 130px;
    margin: 0 auto;
  }

  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 4; }
  .timer-ring .bg-ring { stroke: rgba(184,137,42,0.2); }
  .timer-ring .fg-ring {
    stroke: var(--gold-hi);
    stroke-dasharray: 377;
    stroke-dashoffset: 377;
    transition: stroke-dashoffset 0.2s linear;
    filter: drop-shadow(0 0 6px rgba(232,195,107,0.5));
  }

  .timer-number {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--gold-hi);
    font-family: var(--font-display);
  }

  /* === Responsive === */

  /* Tablet: stack chronicle & watch-tower into a strip below scroll */

      height: auto;

            <span class="meta-chip risk-${req.risk}">${riskLabel}</span>
          </div>
        </div>
      </div>

      <div class="plea">
        伏望陛下明鉴<br>
        <span class="plea-sub">若允之，则盖玉玺；若不允，则付丙丁</span>
      </div>

      <div class="verdict">
        <button class="verdict-btn btn-reject" id="btn-reject">
          <div class="verdict-icon">
            <svg width="46" height="46" viewBox="0 0 46 46">
              <path class="flame" d="M23 4 Q 18 14 22 20 Q 12 18 10 30 Q 10 42 23 42 Q 36 42 36 30 Q 34 18 24 20 Q 28 14 23 4 Z"
                    fill="#c44a18" stroke="#3a1808" stroke-width="1.2"/>
              <path d="M23 14 Q 20 22 23 28 Q 26 22 23 14 Z" fill="#ffdb8a"/>
            </svg>
          </div>
          <div class="verdict-label">焚 毁</div>
          <div class="verdict-hint">BURN · [D]</div>
        </button>

        <button class="verdict-btn btn-approve" id="btn-approve">
          <div class="verdict-icon">
            <svg width="46" height="46" viewBox="0 0 46 46">
              <circle class="wax" cx="23" cy="23" r="18" fill="#a01818" stroke="#3b0808" stroke-width="1.5"/>
              <circle cx="23" cy="23" r="14" fill="none" stroke="#3b0808" stroke-width="1"/>
              <text x="23" y="28" text-anchor="middle" font-family="Cinzel, serif" font-size="11" font-weight="800" fill="#3b0808">REX</text>
              <ellipse cx="17" cy="16" rx="4" ry="2.5" fill="rgba(255,200,180,0.4)"/>
            </svg>
          </div>
          <div class="verdict-label">盖 印</div>
          <div class="verdict-hint">SEAL · [A]</div>
        </button>
      </div>
    `;

    document.getElementById('btn-approve').addEventListener('click', approve);
    document.getElementById('btn-reject').addEventListener('click', reject);
  }

  // === Haptics ===
  function vibrate(pattern) {
    if ('vibrate' in navigator) {
      try { navigator.vibrate(pattern); } catch (_) {}
    }
  }

  // === Approve ===
  function approve() {
    if (state.locked || !state.currentRequest) return;
    state.locked = true;
    vibrate(40);

    const scroll = document.getElementById('scroll');
    const parchment = document.getElementById('parchment');

    // Place wax seal
    const seal = document.createElement('div');
    seal.className = 'wax-seal active';
    const tpl = document.getElementById('wax-template');
    seal.appendChild(tpl.content.cloneNode(true));
    parchment.appendChild(seal);

    scroll.classList.add('sealed');

    state.sealed++;
    pushLedger('seal', state.currentRequest.intent);
    updateStats();

    setTimeout(() => {
      scroll.classList.remove('sealed');
      nextRound();
    }, 1800);
  }

  // === Reject (burn) ===
  function reject() {
    if (state.locked || !state.currentRequest) return;
    state.locked = true;
    vibrate([80, 40, 80]);

    const scroll = document.getElementById('scroll');
    const embers = document.getElementById('embers');

    // spawn embers
    for (let i = 0; i < 30; i++) {
      const e = document.createElement('div');
      e.className = 'ember';
      e.style.left = Math.random() * 100 + '%';
      e.style.animationDelay = (Math.random() * 0.4) + 's';
      e.style.setProperty('--drift', ((Math.random() - 0.5) * 80) + 'px');
      embers.appendChild(e);
    }

    scroll.classList.add('burning');

    state.burned++;
    pushLedger('ash', state.currentRequest.intent);
    updateStats();

    setTimeout(() => {
      scroll.classList.remove('burning');
      embers.innerHTML = '';
      nextRound();
    }, 1700);
  }

  // === Next round ===
  function nextRound() {
    state.locked = false;
    state.currentRequest = null;
    clearInterval(state.timerInterval);
    state.secondsLeft = 5;
    updateTimer();
    state.timerInterval = setInterval(tickTimer, 1000);
    document.getElementById('parchment').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:420px;gap:16px;">
        <svg width="60" height="60" viewBox="0 0 60 60">
          <circle cx="30" cy="30" r="26" fill="none" stroke="#7a3a18" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.4">
            <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="8s" repeatCount="indefinite"/>
          </circle>
          <circle cx="30" cy="30" r="4" fill="#7a3a18"/>
        </svg>
        <div style="font-family:var(--font-brush);font-size:22px;color:#5a3a18;letter-spacing:4px;">
          屏察御史巡察中…
        </div>
        <div style="font-family:var(--font-body);font-style:italic;color:#7a5a28;font-size:13px;">
          Awaiting next observation from the realm…
        </div>
      </div>
    `;
  }

  // === Timer ===
  function updateTimer() {
    document.getElementById('timer-num').textContent = state.secondsLeft;
    const ring = document.getElementById('timer-ring');
    const ratio = state.secondsLeft / 5;
    const C = 2 * Math.PI * 60;
    ring.style.strokeDashoffset = C * (1 - ratio);
  }

  function tickTimer() {
    state.secondsLeft--;
    if (state.secondsLeft <= 0) {
      clearInterval(state.timerInterval);
      summonRequest();
      return;
    }
    updateTimer();
  }

  // === Summon fresh request ===
  function summonRequest() {
    const req = REQUEST_POOL[Math.floor(Math.random() * REQUEST_POOL.length)];
    state.currentRequest = req;
    renderRequest(req);
  }

  // === Ledger ===
  function pushLedger(kind, intent) {
    const ledger = document.getElementById('ledger');
    const empty = ledger.querySelector('.empty-ledger');
    if (empty) empty.remove();

    const now = new Date();
    const tm = now.toLocaleTimeString('zh-CN', { hour12: false });

    const item = document.createElement('div');
    item.className = 'ledger-item';
    const glyph = kind === 'seal'
      ? '<div class="ledger-glyph seal">●</div>'
      : '<div class="ledger-glyph ash">✕</div>';
    const verb = kind === 'seal' ? '准奏' : '焚毁';
    item.innerHTML = `
      ${glyph}
      <div class="ledger-text">
        <div><strong>${verb}</strong> · ${intent}</div>
        <div class="ledger-time">${tm}</div>
      </div>
    `;
    ledger.insertBefore(item, ledger.firstChild);

    // cap
    const items = ledger.querySelectorAll('.ledger-item');
    if (items.length > 20) items[items.length - 1].remove();
  }

  function updateStats() {
    document.getElementById('stat-sealed').textContent = state.sealed;
    document.getElementById('stat-burned').textContent = state.burned;
    document.getElementById('stat-total').textContent = state.sealed + state.burned;
    const total = state.sealed + state.burned;
    document.getElementById('stat-rate').textContent =
      total === 0 ? '—' : Math.round((state.sealed / total) * 100) + '%';
  }

  // === Hotkeys ===
  document.addEventListener('keydown', (e) => {
    if (state.locked) return;
    const k = e.key.toLowerCase();
    if (!state.currentRequest) {
      if (k === ' ') {
        clearInterval(state.timerInterval);
        summonRequest();
      }
      return;
    }
    if (k === 'a') approve();
    else if (k === 'd') reject();
  });

  // === Swipe gesture (phone/tablet) ===
  (function setupSwipe() {
    const scroll = document.getElementById('scroll');
    const THRESHOLD = 80;         // px to trigger verdict
    const AXIS_LOCK = 1.2;        // |dx| must exceed |dy|*lock to count as horizontal
    const MAX_FADE = 420;         // px at which opacity reaches min
    let startX = 0, startY = 0, dx = 0, dy = 0, active = false, axisDecided = false;

    function resetTransform() {
      scroll.style.transform = '';
      scroll.style.opacity = '';
      scroll.classList.remove('dragging', 'drag-left', 'drag-right');
    }

    scroll.addEventListener('touchstart', (e) => {
      if (state.locked || !state.currentRequest) return;
      if (e.touches.length !== 1) return;
      const t = e.touches[0];
      startX = t.clientX; startY = t.clientY;
      dx = 0; dy = 0; active = true; axisDecided = false;
      scroll.classList.add('dragging');
    }, { passive: true });

    scroll.addEventListener('touchmove', (e) => {
      if (!active) return;
      const t = e.touches[0];
      dx = t.clientX - startX;
      dy = t.clientY - startY;

      if (!axisDecided && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
        axisDecided = true;
        if (Math.abs(dy) > Math.abs(dx) * AXIS_LOCK) {
          // vertical scroll — bail
          active = false;
          resetTransform();
          return;
        }
      }
      if (!axisDecided) return;

      const rot = dx / 36;
      const fade = Math.max(0.35, 1 - Math.abs(dx) / MAX_FADE);
      scroll.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
      scroll.style.opacity = fade;
      scroll.classList.toggle('drag-right', dx > 24);
      scroll.classList.toggle('drag-left', dx < -24);
    }, { passive: true });

    function finish() {
      if (!active) return;
      active = false;
      const committed = Math.abs(dx) > THRESHOLD;
      resetTransform();
      if (!committed) return;
      if (dx > 0) approve();
      else reject();
    }

    scroll.addEventListener('touchend', finish);
    scroll.addEventListener('touchcancel', () => { active = false; resetTransform(); });
  })();

  // === Boot ===
  nextRound();

</script>
</body>
</html>

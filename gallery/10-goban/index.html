<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0f06">
<title>围棋 · Go Board</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%E2%9A%AB%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background: radial-gradient(ellipse at center, #3b2812 0%, #0a0604 80%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    text-align: center;
    padding: 20px;
    width: 100%;
    max-width: 720px;
  }

  .request {
    margin-bottom: 20px;
  }
  .request .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 6px; }
  .request .intent { font-family: var(--font-brush); font-size: 20px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 8px; }
  .request .reason { font-size: 12px; color: #b4a080; line-height: 1.6; font-style: italic; max-width: 460px; margin: 0 auto; }

  .game {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    align-items: center;
    margin: 20px auto;
  }

  .bowl {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #8b6510, #3b2812 70%, #1a0f06 100%);
    box-shadow: inset 0 8px 16px rgba(0, 0, 0, 0.6), 0 6px 16px rgba(0, 0, 0, 0.5);
    position: relative;
    cursor: grab;
    user-select: none;
    transition: transform 0.2s;
  }
  .bowl:hover { transform: translateY(-4px); }
  .bowl::before {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #5a3a08, #2a1a08);
  }
  .bowl .stone-peek {
    position: absolute;
    top: 28%;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    z-index: 2;
  }
  .bowl.white .stone-peek {
    background: radial-gradient(circle at 35% 30%, #fff, #d0d0d0 60%, #888);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
  }
  .bowl.black .stone-peek {
    background: radial-gradient(circle at 35% 30%, #5a5a5a, #1a1a1a 60%, #000);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
  }
  .bowl-label {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-brush);
    font-size: 14px;
    letter-spacing: 3px;
    white-space: nowrap;
  }
  .bowl.white .bowl-label { color: var(--gold-hi); }
  .bowl.black .bowl-label { color: #8a9abf; }

  .board-wrap {
    position: relative;
    aspect-ratio: 1;
    max-width: 380px;
    margin: 0 auto;
    background:
      radial-gradient(ellipse at 30% 20%, #e9c36b 0%, #b8892a 70%, #7a5510 100%);
    border: 4px solid #3b2812;
    border-radius: 4px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    padding: 20px;
  }

  .board {
    position: relative;
    width: 100%;
    height: 100%;
    background-image:
      linear-gradient(to right, rgba(59, 40, 18, 0.9) 0 1px, transparent 1px),
      linear-gradient(to bottom, rgba(59, 40, 18, 0.9) 0 1px, transparent 1px);
    background-size: calc(100% / 8) calc(100% / 8);
  }

  .dot {
    position: absolute;
    width: 7px;
    height: 7px;
    background: #3b2812;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  .slot {
    position: absolute;
    width: 34px;
    height: 34px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border-radius: 50%;
  }
  .slot:hover::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: rgba(232, 195, 107, 0.3);
    animation: pulseSlot 1.4s ease-in-out infinite;
  }
  @keyframes pulseSlot {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.15); }
  }

  .stone {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    transition: transform 0.3s cubic-bezier(0.3, 0.8, 0.3, 1.3);
    box-shadow: 2px 4px 8px rgba(0, 0, 0, 0.5);
    pointer-events: none;
  }
  .stone.show { transform: translate(-50%, -50%) scale(1); }
  .stone.white {
    background: radial-gradient(circle at 35% 30%, #fff, #d0d0d0 70%, #888);
  }
  .stone.black {
    background: radial-gradient(circle at 35% 30%, #5a5a5a, #1a1a1a 70%, #000);
  }

  .instruction {
    margin-top: 16px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
  }

  .selected-bowl {
    filter: drop-shadow(0 0 12px var(--gold-hi));
    transform: translateY(-8px);
  }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">围棋</div><div class="en">Go Board</div></div>

<div class="stage">
  <div class="request req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
    <div style="margin-top:4px;"><span class="req-risk" id="r-risk"></span></div>
  </div>

  <div class="game">
    <div class="bowl white" id="bowl-w">
      <div class="stone-peek"></div>
      <div class="bowl-label">白 · 准</div>
    </div>
    <div class="board-wrap">
      <div class="board" id="board">
        <!-- 3x3 grid of play points at star positions -->
      </div>
    </div>
    <div class="bowl black" id="bowl-b">
      <div class="stone-peek"></div>
      <div class="bowl-label">黑 · 驳</div>
    </div>
  </div>

  <div class="instruction">拈一子 · 落于天元或星位 · 即下裁断</div>
</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  const board = document.getElementById('board');
  const bowlW = document.getElementById('bowl-w');
  const bowlB = document.getElementById('bowl-b');
  let selectedKind = null;
  let committed = false;

  const pts = [
    [25, 25], [50, 25], [75, 25],
    [25, 50], [50, 50], [75, 50],
    [25, 75], [50, 75], [75, 75]
  ];
  pts.forEach(([x, y], i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.left = x + '%';
    dot.style.top = y + '%';
    board.appendChild(dot);

    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.style.left = x + '%';
    slot.style.top = y + '%';
    slot.addEventListener('click', () => placeStone(x, y));
    board.appendChild(slot);
  });

  function placeStone(x, y) {
    if (committed || !selectedKind) return;
    committed = true;
    const stone = document.createElement('div');
    stone.className = 'stone ' + (selectedKind === 'approve' ? 'white' : 'black');
    stone.style.left = x + '%';
    stone.style.top = y + '%';
    board.appendChild(stone);
    requestAnimationFrame(() => stone.classList.add('show'));
    setTimeout(() => window.cast(selectedKind), 700);
  }

  bowlW.addEventListener('click', () => {
    if (committed) return;
    selectedKind = 'approve';
    bowlW.classList.add('selected-bowl');
    bowlB.classList.remove('selected-bowl');
  });
  bowlB.addEventListener('click', () => {
    if (committed) return;
    selectedKind = 'reject';
    bowlB.classList.add('selected-bowl');
    bowlW.classList.remove('selected-bowl');
  });

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
    const risk = document.getElementById('r-risk');
    risk.textContent = '风险 · ' + window.riskLabel(r.risk);
    risk.className = 'req-risk ' + r.risk;
  }
  loadReq();

  window.nextRequest = () => {
    committed = false;
    selectedKind = null;
    bowlW.classList.remove('selected-bowl');
    bowlB.classList.remove('selected-bowl');
    board.querySelectorAll('.stone').forEach(s => s.remove());
    loadReq();
  };
</script>
</body>
</html>

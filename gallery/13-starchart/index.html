<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050816">
<title>星图 · Celestial Chart</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background:
      radial-gradient(ellipse at 50% 30%, #1a1a3a 0%, #050816 70%, #000 100%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 5% 10%, #fff, transparent),
      radial-gradient(1px 1px at 15% 70%, #fff, transparent),
      radial-gradient(1px 1px at 25% 25%, rgba(255,200,160,0.8), transparent),
      radial-gradient(1px 1px at 40% 80%, #fff, transparent),
      radial-gradient(1px 1px at 55% 40%, rgba(200,200,255,0.9), transparent),
      radial-gradient(1px 1px at 70% 15%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 85% 60%, rgba(255,220,180,0.9), transparent),
      radial-gradient(1px 1px at 92% 35%, #fff, transparent),
      radial-gradient(1px 1px at 8% 90%, #fff, transparent),
      radial-gradient(1px 1px at 60% 95%, rgba(200,220,255,0.7), transparent);
    background-size: 100% 100%;
    animation: twinkle 4s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes twinkle { from { opacity: 0.7; } to { opacity: 1; } }

  .sky {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  .card {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 440px;
    padding: 20px 26px;
    background: rgba(5, 8, 22, 0.7);
    border: 1px solid rgba(184, 137, 42, 0.35);
    backdrop-filter: blur(14px);
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }
  .card .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 8px; }
  .card .intent { font-family: var(--font-brush); font-size: 18px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 6px; }
  .card .reason { font-size: 12px; color: #b4a080; line-height: 1.6; font-style: italic; }

  .star {
    position: absolute;
    width: 24px;
    height: 24px;
    margin-left: -12px;
    margin-top: -12px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.2s;
    z-index: 3;
  }
  .star::before {
    content: '✦';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.85);
    font-size: 14px;
    text-shadow: 0 0 8px currentColor;
  }
  .star:hover { transform: scale(1.4); }
  .star.lit::before {
    color: currentColor;
    text-shadow: 0 0 16px currentColor, 0 0 4px currentColor;
    font-size: 18px;
  }

  .star.approve { color: #e9c36b; }
  .star.reject { color: #ff6a6a; }

  .label {
    position: absolute;
    font-family: var(--font-brush);
    font-size: 12px;
    letter-spacing: 3px;
    white-space: nowrap;
    opacity: 0.7;
    pointer-events: none;
  }
  .label.east { color: #e9c36b; right: 8%; top: 45%; }
  .label.west { color: #ff6a6a; left: 8%; top: 45%; }

  .constellation {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  .constellation line {
    stroke: rgba(232, 195, 107, 0.6);
    stroke-width: 1.5;
    fill: none;
    stroke-dasharray: 3;
  }
  .constellation line.approve { stroke: rgba(232, 195, 107, 0.8); }
  .constellation line.reject { stroke: rgba(255, 106, 106, 0.8); }

  .instruction {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
  }

  .chinese-name {
    position: absolute;
    font-family: var(--font-brush);
    font-size: 18px;
    letter-spacing: 4px;
    color: currentColor;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">星图</div><div class="en">Celestial Chart</div></div>

<div class="sky">
  <svg class="constellation" id="svg"></svg>
  <div class="card req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
  </div>

  <div class="label east">朱雀 · 南方<br><small style="font-family:var(--font-display);font-size:9px;letter-spacing:3px;">Phoenix · Approve</small></div>
  <div class="label west">玄武 · 北方<br><small style="font-family:var(--font-display);font-size:9px;letter-spacing:3px;">Tortoise · Reject</small></div>
</div>

<div class="instruction">连结四星成阵 · 朱雀为准 · 玄武为驳</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  // Two constellation patterns — 4 stars each
  // Approve (right side / Phoenix)
  const approveStars = [
    { x: 78, y: 30 }, { x: 88, y: 42 }, { x: 82, y: 56 }, { x: 72, y: 48 }
  ];
  const rejectStars = [
    { x: 12, y: 30 }, { x: 22, y: 42 }, { x: 18, y: 56 }, { x: 28, y: 48 }
  ];

  const sky = document.querySelector('.sky');
  const svg = document.getElementById('svg');
  let lit = []; // array of {kind, idx}
  let committed = false;

  function placeStars() {
    approveStars.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'star approve';
      el.dataset.kind = 'approve';
      el.dataset.i = i;
      el.style.left = s.x + '%';
      el.style.top = s.y + '%';
      el.addEventListener('click', () => litStar(el));
      sky.appendChild(el);
    });
    rejectStars.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'star reject';
      el.dataset.kind = 'reject';
      el.dataset.i = i;
      el.style.left = s.x + '%';
      el.style.top = s.y + '%';
      el.addEventListener('click', () => litStar(el));
      sky.appendChild(el);
    });
  }
  placeStars();

  function litStar(el) {
    if (committed) return;
    const kind = el.dataset.kind;
    if (lit.length && lit[0].kind !== kind) {
      // clear on kind switch
      lit.forEach(s => s.el.classList.remove('lit'));
      lit = [];
      svg.innerHTML = '';
    }
    if (el.classList.contains('lit')) return;
    el.classList.add('lit');
    lit.push({ el, kind, idx: parseInt(el.dataset.i) });
    drawLines();
    if (lit.length === 4) {
      committed = true;
      setTimeout(() => window.cast(kind), 700);
    }
  }

  function drawLines() {
    svg.innerHTML = '';
    svg.setAttribute('viewBox', `0 0 ${innerWidth} ${innerHeight}`);
    svg.setAttribute('preserveAspectRatio', 'none');
    for (let i = 0; i < lit.length - 1; i++) {
      const a = lit[i].el.getBoundingClientRect();
      const b = lit[i + 1].el.getBoundingClientRect();
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', a.left + 12);
      line.setAttribute('y1', a.top + 12);
      line.setAttribute('x2', b.left + 12);
      line.setAttribute('y2', b.top + 12);
      line.setAttribute('class', lit[i].kind);
      svg.appendChild(line);
    }
  }

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
  }
  loadReq();

  window.nextRequest = () => {
    committed = false;
    lit.forEach(s => s.el.classList.remove('lit'));
    lit = [];
    svg.innerHTML = '';
    loadReq();
  };
</script>
</body>
</html>

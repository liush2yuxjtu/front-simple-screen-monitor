<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0f06">
<meta name="description" content="屏察御史 · 二十廊 — 20 chambers of judgment for the same screen-monitor consent prompt.">
<title>屏察御史 · 二十廊</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%F0%9F%9B%95%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b8892a;
    --gold-hi: #e9c36b;
    --parch: #e4c98a;
    --ink: #2b1a08;
    --wax: #8b1a1a;
    --ember: #ff7a2a;
    --font-brush: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', serif;
    --font-display: 'Cinzel', 'PingFang SC', serif;
    --font-body: 'Noto Serif SC', 'PingFang SC', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    font-family: var(--font-body);
    color: #f0e2bb;
    background: #0a0604;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(ellipse at top, #3b2812 0%, #1a0f06 60%, #0a0604 100%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 8% 12%, rgba(255, 140, 40, 0.15), transparent 22%),
      radial-gradient(circle at 92% 12%, rgba(255, 140, 40, 0.15), transparent 22%);
    pointer-events: none;
    animation: flicker 4s ease-in-out infinite;
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1360px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 44px;
  }
  .eyebrow {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 8px;
    color: var(--gold-hi);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  h1 {
    font-family: var(--font-brush);
    font-size: 56px;
    color: var(--gold-hi);
    letter-spacing: 12px;
    line-height: 1.1;
    text-shadow: 0 4px 20px rgba(232, 195, 107, 0.3);
  }
  .sub {
    margin-top: 14px;
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 6px;
    color: #b4985a;
    text-transform: uppercase;
  }
  .blurb {
    max-width: 620px;
    margin: 22px auto 0;
    font-size: 14px;
    line-height: 1.8;
    color: #c4a876;
    font-style: italic;
  }

  .surprise {
    margin: 30px auto 10px;
    display: inline-block;
    padding: 12px 26px;
    border: 1px solid var(--gold-hi);
    color: var(--gold-hi);
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    background: rgba(232, 195, 107, 0.05);
    cursor: pointer;
    transition: all 0.25s;
  }
  .surprise:hover {
    background: rgba(232, 195, 107, 0.18);
    transform: translateY(-2px);
  }

  .back-home {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(232, 195, 107, 0.55);
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid rgba(184, 137, 42, 0.25);
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(8px);
  }
  .back-home:hover { color: var(--gold-hi); border-color: var(--gold-hi); }

  .legend {
    max-width: 820px;
    margin: 0 auto 40px;
    padding: 16px 24px;
    background: rgba(20, 12, 6, 0.5);
    border: 1px solid rgba(184, 137, 42, 0.2);
    border-radius: 2px;
    text-align: center;
    font-size: 13px;
    color: #a89060;
    line-height: 1.7;
  }
  .legend b {
    color: var(--gold-hi);
    font-family: var(--font-brush);
    letter-spacing: 2px;
    font-weight: 400;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .tile {
    position: relative;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(40, 26, 12, 0.8), rgba(14, 8, 4, 0.95));
    border: 1px solid rgba(184, 137, 42, 0.3);
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.2, 0.8, 0.3, 1);
    aspect-ratio: 3 / 4;
  }
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% -20%, rgba(232, 195, 107, 0.1), transparent 70%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tile:hover {
    transform: translateY(-6px);
    border-color: var(--gold-hi);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(232, 195, 107, 0.3);
  }
  .tile:hover::before { opacity: 1; }
  .tile:hover .preview .anim { animation-play-state: running; }

  .tile .num {
    position: absolute;
    top: 12px;
    left: 14px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(232, 195, 107, 0.55);
    z-index: 2;
  }

  .tile .badge {
    position: absolute;
    top: 12px;
    right: 14px;
    font-family: var(--font-display);
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(232, 195, 107, 0.4);
    text-transform: uppercase;
    z-index: 2;
  }

  .preview {
    position: relative;
    aspect-ratio: 1;
    border-bottom: 1px solid rgba(184, 137, 42, 0.2);
    overflow: hidden;
    background: #0a0604;
  }

  .tile-info {
    padding: 14px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .tile-info .cn {
    font-family: var(--font-brush);
    font-size: 22px;
    color: var(--gold-hi);
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .tile-info .en {
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: 3px;
    color: #8a7650;
    text-transform: uppercase;
  }
  .tile-info .mech {
    margin-top: 8px;
    font-size: 11px;
    color: #a89060;
    line-height: 1.5;
  }

  /* --- Preview animations (shared keyframes) --- */
  .anim { animation-play-state: paused; }

  /* 01 — iching coin flip */
  .pv-iching {
    background: radial-gradient(circle, #3b2812 0%, #120904 100%);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .pv-iching .c {
    width: 24px; height: 24px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #e9c36b, #5a3a08);
    border: 2px solid #3b2812;
    animation: icoinFlip 1.8s ease-in-out infinite;
  }
  .pv-iching .c:nth-child(2) { animation-delay: 0.2s; }
  .pv-iching .c:nth-child(3) { animation-delay: 0.4s; }
  @keyframes icoinFlip {
    0%, 100% { transform: translateY(0) rotateY(0); }
    50% { transform: translateY(-30px) rotateY(720deg); background: radial-gradient(circle at 30% 30%, #3b2812, #1a0f06); }
  }

  /* 02 — brush stroke */
  .pv-brush {
    background: radial-gradient(ellipse, #f2e1b8, #c9a35a);
    position: relative;
  }
  .pv-brush::after {
    content: '';
    position: absolute;
    inset: 30%;
    background:
      linear-gradient(45deg, transparent 45%, #c02a2a 46% 54%, transparent 55%),
      linear-gradient(-45deg, transparent 45%, #c02a2a 46% 54%, transparent 55%);
    transform-origin: center;
    animation: brushDraw 2s ease-in-out infinite;
  }
  @keyframes brushDraw {
    0% { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
    50% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    100% { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
  }

  /* 03 — mirror tilt */
  .pv-mirror { background: #1a0f06; perspective: 400px; }
  .pv-mirror .m {
    position: absolute; inset: 20%;
    border-radius: 50% 50% 8% 8%;
    background:
      radial-gradient(ellipse at 30% 20%, #e9c36b, #7a5510 70%);
    animation: mirTilt 3s ease-in-out infinite alternate;
  }
  @keyframes mirTilt {
    0% { transform: rotateY(-25deg); }
    100% { transform: rotateY(25deg); }
  }

  /* 04 — ripple */
  .pv-ripple { background: radial-gradient(circle, #1a2e2a 0%, #0a1410 100%); position: relative; }
  .pv-ripple .r {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--gold-hi);
    animation: rippleOut 2s ease-out infinite;
  }
  .pv-ripple .r:nth-child(2) { animation-delay: 0.7s; }
  .pv-ripple .r:nth-child(3) { animation-delay: 1.4s; }
  @keyframes rippleOut {
    from { width: 10px; height: 10px; opacity: 1; }
    to { width: 150px; height: 150px; opacity: 0; }
  }

  /* 05 — pigeon */
  .pv-pigeon { background: linear-gradient(180deg, #1a2840 0%, #3b2812 100%); position: relative; overflow: hidden; }
  .pv-pigeon .p {
    position: absolute;
    font-size: 32px;
    animation: pigeonFly 4s linear infinite;
  }
  .pv-pigeon .p:nth-child(1) { top: 30%; animation-delay: 0s; }
  .pv-pigeon .p:nth-child(2) { top: 55%; animation-delay: -2s; }
  @keyframes pigeonFly {
    from { left: -50px; }
    to { left: 120%; }
  }

  /* 06 — fan */
  .pv-fan { background: radial-gradient(circle, #3b2812 0%, #120904 100%); position: relative; }
  .pv-fan::after {
    content: '';
    position: absolute;
    left: 50%; bottom: 20%;
    width: 80px; height: 80px;
    margin-left: -40px;
    background: conic-gradient(from -60deg, transparent 0deg, #e4c98a 30deg, #c9a35a 120deg, transparent 150deg);
    transform-origin: 50% 100%;
    animation: fanOpen 3s ease-in-out infinite alternate;
    border-radius: 100% 100% 0 0 / 50% 50% 0 0;
  }
  @keyframes fanOpen {
    from { transform: rotate(-30deg) scale(0.5); }
    to { transform: rotate(30deg) scale(1); }
  }

  /* 07 — scales */
  .pv-scales {
    background: radial-gradient(circle, #2a1a0f 0%, #0a0604 100%);
    position: relative;
  }
  .pv-scales::before {
    content: '';
    position: absolute;
    left: 50%; bottom: 30%;
    width: 2px; height: 40px;
    margin-left: -1px;
    background: var(--gold);
  }
  .pv-scales::after {
    content: '';
    position: absolute;
    left: 20%; right: 20%; bottom: calc(30% + 40px);
    height: 3px;
    background: var(--gold-hi);
    transform-origin: center;
    animation: scalesTilt 2.4s ease-in-out infinite alternate;
  }
  @keyframes scalesTilt {
    from { transform: rotate(-8deg); }
    to { transform: rotate(8deg); }
  }

  /* 08 — beacon */
  .pv-beacon {
    background: radial-gradient(ellipse at 50% 100%, #3b1206 0%, #000 100%);
    position: relative;
    overflow: hidden;
  }
  .pv-beacon::before {
    content: '';
    position: absolute;
    left: 50%; bottom: 20%;
    width: 20px; height: 60px;
    margin-left: -10px;
    background: #3b2812;
  }
  .pv-beacon::after {
    content: '';
    position: absolute;
    left: 50%; bottom: 50%;
    width: 30px; height: 40px;
    margin-left: -15px;
    background: radial-gradient(ellipse at 50% 90%, #ffcf4a, #ff7a2a 50%, #c02a2a 80%, transparent);
    border-radius: 50% 50% 30% 30%;
    filter: blur(2px);
    animation: beaconFlicker 0.3s ease-in-out infinite alternate;
  }
  @keyframes beaconFlicker {
    from { transform: scaleY(1) scaleX(1); opacity: 0.85; }
    to { transform: scaleY(1.15) scaleX(0.9); opacity: 1; }
  }

  /* 09 — hourglass */
  .pv-hourglass {
    background: radial-gradient(circle, #2a1a0f, #0a0604);
    position: relative;
    animation: hgTilt 5s ease-in-out infinite alternate;
  }
  .pv-hourglass::before, .pv-hourglass::after {
    content: '';
    position: absolute;
    left: 50%; width: 50px; margin-left: -25px;
    height: 60px;
    border: 2px solid var(--gold);
  }
  .pv-hourglass::before {
    top: 20%;
    border-radius: 50% 50% 0 0 / 60% 60% 0 0;
    clip-path: polygon(0 0, 100% 0, 54% 100%, 46% 100%);
  }
  .pv-hourglass::after {
    bottom: 20%;
    border-radius: 0 0 50% 50% / 0 0 60% 60%;
    clip-path: polygon(46% 0, 54% 0, 100% 100%, 0 100%);
  }
  @keyframes hgTilt {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  /* 10 — goban */
  .pv-goban {
    background: radial-gradient(ellipse, #e9c36b, #7a5510);
    background-image:
      linear-gradient(rgba(59, 40, 18, 0.8) 0 1px, transparent 1px),
      linear-gradient(90deg, rgba(59, 40, 18, 0.8) 0 1px, transparent 1px);
    background-size: 20% 20%;
  }
  .pv-goban::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #888);
    animation: gobanBlink 2s ease-in-out infinite alternate;
  }
  @keyframes gobanBlink {
    0% { background: radial-gradient(circle at 35% 30%, #fff, #888); }
    100% { background: radial-gradient(circle at 35% 30%, #5a5a5a, #000); }
  }

  /* 11 — seal */
  .pv-seal {
    background: radial-gradient(ellipse, #f2e1b8, #c9a35a);
    position: relative;
  }
  .pv-seal::after {
    content: '御准';
    position: absolute;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
    font-family: var(--font-brush);
    font-size: 28px;
    letter-spacing: 4px;
    color: #8b1a1a;
    border: 3px solid #8b1a1a;
    padding: 8px;
    border-radius: 4px;
    animation: sealStamp 2s ease-in-out infinite;
  }
  @keyframes sealStamp {
    0%, 70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    80% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.4; }
    90%, 100% { transform: translate(-50%, -150%) scale(1); opacity: 0; }
  }

  /* 12 — chime */
  .pv-chime {
    background: radial-gradient(circle, #2a1a0f, #0a0604);
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }
  .pv-chime .b {
    width: 40px; height: 50px;
    background: radial-gradient(circle at 50% 30%, #e9c36b, #5a3a08);
    border-radius: 50% 50% 40% 40% / 20% 20% 40% 40%;
    animation: chimeRing 1.8s ease-in-out infinite;
    transform-origin: 50% 0;
  }
  .pv-chime .b:nth-child(2) { animation-delay: 0.6s; background: radial-gradient(circle at 50% 30%, #8b6510, #3b2812); }
  @keyframes chimeRing {
    0%, 50%, 100% { transform: rotate(0); }
    15% { transform: rotate(12deg); }
    30% { transform: rotate(-8deg); }
  }

  /* 13 — starchart */
  .pv-starchart {
    background: radial-gradient(ellipse, #1a1a3a 0%, #000 70%);
    position: relative;
  }
  .pv-starchart::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 25%, #fff, transparent),
      radial-gradient(1px 1px at 60% 40%, #fff, transparent),
      radial-gradient(1px 1px at 35% 70%, #e9c36b, transparent),
      radial-gradient(1px 1px at 75% 65%, #e9c36b, transparent),
      radial-gradient(1px 1px at 80% 20%, #fff, transparent);
    animation: twinkle 2s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.6; } to { opacity: 1; } }

  /* 14 — waterfall / scroll */
  .pv-waterfall {
    background: linear-gradient(180deg, #3b2812 0%, #120904 100%);
    position: relative;
    overflow: hidden;
  }
  .pv-waterfall::after {
    content: '';
    position: absolute;
    left: 25%; right: 25%; top: 10%;
    height: 120%;
    background:
      radial-gradient(ellipse at 50% 10%, #f2e1b8, #c9a35a 100%);
    animation: scrollCascade 3s ease-in-out infinite;
  }
  @keyframes scrollCascade {
    0% { transform: translateY(-100%); }
    50% { transform: translateY(0); }
    100% { transform: translateY(100%); opacity: 0; }
  }

  /* 15 — lantern */
  .pv-lantern {
    background: radial-gradient(ellipse at 50% 30%, #3b1a12, #000 70%);
    position: relative;
  }
  .pv-lantern::before {
    content: '福';
    position: absolute;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
    font-family: var(--font-brush);
    font-size: 50px;
    color: #2a0808;
    padding: 20px 25px;
    background: radial-gradient(ellipse, #ff6a3a, #c02a2a 70%);
    border: 3px solid var(--gold);
    border-radius: 50% 50% 15% 15% / 40% 40% 20% 20%;
    box-shadow: 0 0 40px rgba(255, 120, 40, 0.5);
    animation: lanternSway 3s ease-in-out infinite alternate;
  }
  @keyframes lanternSway {
    0% { transform: translate(-52%, -50%) rotate(-2deg); box-shadow: 0 0 20px rgba(255, 120, 40, 0.3); }
    100% { transform: translate(-48%, -50%) rotate(2deg); box-shadow: 0 0 60px rgba(255, 120, 40, 0.7); }
  }

  /* 16 — scabbard */
  .pv-scabbard {
    background: radial-gradient(ellipse at 50% 40%, #2a1a0f, #000 100%);
    position: relative;
  }
  .pv-scabbard::before {
    content: '';
    position: absolute;
    left: 50%; bottom: 10%;
    width: 20px; height: 60%;
    margin-left: -10px;
    background: linear-gradient(180deg, #7a5510, #3b2812);
    border-radius: 4px 4px 8px 8px;
  }
  .pv-scabbard::after {
    content: '';
    position: absolute;
    left: 50%; bottom: 10%;
    width: 6px; height: 70%;
    margin-left: -3px;
    background: linear-gradient(90deg, #8a9abf, #fff 50%, #5a6a8f);
    animation: sceSword 2.8s ease-in-out infinite;
  }
  @keyframes sceSword {
    0%, 100% { height: 70%; bottom: 10%; }
    50% { height: 100%; bottom: 70%; filter: drop-shadow(0 0 10px #e0e6f0); }
  }

  /* 17 — tea */
  .pv-tea {
    background: linear-gradient(180deg, #5a3a08, #2a1808);
    position: relative;
  }
  .pv-tea::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 50px; height: 40px;
    background: #f2e8d8;
    border-radius: 0 0 50% 50% / 0 0 30% 30%;
    border: 2px solid #7a5510;
  }
  .pv-tea::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 42px; height: 30px;
    background: linear-gradient(180deg, #7ab576, #2d7a4a);
    animation: teaFill 3s ease-in-out infinite alternate;
    transform-origin: 50% 100%;
  }
  @keyframes teaFill {
    0% { clip-path: inset(100% 0 0 0); background: linear-gradient(180deg, #d03a3a, #8b1a1a); }
    50% { clip-path: inset(0 0 0 0); background: linear-gradient(180deg, #d4b068, #8b6510); }
    100% { clip-path: inset(0 0 0 0); background: linear-gradient(180deg, #7ab576, #2d7a4a); }
  }

  /* 18 — dragonball */
  .pv-dragonball {
    background: radial-gradient(ellipse, #1a0f2a, #0a0814);
    position: relative;
  }
  .pv-dragonball::after {
    content: '龍';
    position: absolute;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 100px; height: 100px;
    margin-left: -50px; margin-top: -50px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-brush);
    font-size: 46px;
    color: var(--gold-hi);
    background:
      radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.5), transparent 40%),
      radial-gradient(circle at 60% 70%, rgba(180, 100, 255, 0.6), rgba(60, 20, 100, 0.9) 60%);
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(180, 100, 255, 0.4);
    animation: orbRotate 5s linear infinite;
  }
  @keyframes orbRotate {
    0% { transform: translate(-50%, -50%) rotateY(0); }
    100% { transform: translate(-50%, -50%) rotateY(360deg); }
  }

  /* 19 — butterfly */
  .pv-butterfly {
    background: radial-gradient(ellipse at 30% 40%, #1a3a2a, #050806);
    position: relative;
    overflow: hidden;
  }
  .pv-butterfly::before {
    content: '🦋';
    position: absolute;
    font-size: 28px;
    animation: bfWander 5s ease-in-out infinite;
  }
  @keyframes bfWander {
    0% { left: 10%; top: 70%; }
    25% { left: 40%; top: 30%; }
    50% { left: 70%; top: 60%; }
    75% { left: 35%; top: 50%; }
    100% { left: 10%; top: 70%; }
  }

  /* 20 — fortune */
  .pv-fortune {
    background: radial-gradient(circle, #3b2812, #120904);
    position: relative;
  }
  .pv-fortune::before {
    content: '';
    position: absolute;
    left: 50%; bottom: 20%;
    width: 50px; height: 70%;
    margin-left: -25px;
    background:
      linear-gradient(90deg, #8b6510 0%, #e9c36b 50%, #8b6510 100%);
    border: 1px solid #3b2812;
    border-radius: 4px 4px 10px 10px;
    animation: tubeShake 0.5s ease-in-out infinite alternate;
  }
  @keyframes tubeShake {
    0% { transform: rotate(-4deg); }
    100% { transform: rotate(4deg); }
  }
  .pv-fortune::after {
    content: '';
    position: absolute;
    left: 50%; bottom: 28%;
    width: 3px; height: 60%;
    margin-left: -1px;
    background: linear-gradient(180deg, #c02a2a 0%, #d4b068 15% 100%);
    animation: tubeShake 0.5s ease-in-out infinite alternate-reverse;
  }

  .foot {
    margin-top: 60px;
    text-align: center;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: #6a5a40;
  }

  @media (max-width: 600px) {
    .page { padding: 40px 16px 60px; }
    h1 { font-size: 36px; letter-spacing: 6px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
    .tile-info .cn { font-size: 18px; }
  }
</style>
</head>
<body>
<a class="back-home" href="../">← 御前决策殿</a>

<div class="page">
  <header>
    <div class="eyebrow">Screen Monitor · UX Gallery</div>
    <h1>二十廊</h1>

  <div class="foot">二十廊 · gallery v0.1</div>
</div>

<script>

    { n: '03', slug: '03-mirror',     cn: '铜镜',     en: 'Bronze Mirror',   mech: '倾镜左右，过三十度即裁。',              pv: 'pv-mirror',    extra: '<span class="m"></span>' },

    { n: '06', slug: '06-fan',        cn: '折扇',     en: 'Folding Fan',     mech: '拖开折扇，左展为驳 · 右展为准。',       pv: 'pv-fan',       extra: '' },
    { n: '07', slug: '07-scales',     cn: '天平',     en: 'Scales',          mech: '拖砝码至两盘，一侧重 5 钱即裁。',       pv: 'pv-scales',    extra: '' },
    { n: '08', slug: '08-beacon',     cn: '烽火',     en: 'Beacon Tower',    mech: '调节烽火旋钮，燃尽则准 · 熄灭则驳。',    pv: 'pv-beacon',    extra: '' },
    { n: '09', slug: '09-hourglass',  cn: '沙漏',     en: 'Hourglass',       mech: '沙尽前定 · 翻漏则驳 · 待尽则准。',     pv: 'pv-hourglass', extra: '' },

    { n: '12', slug: '12-chime',      cn: '钟磬',     en: 'Twin Bells',      mech: '击钟一记 · 东钟准 · 西钟驳。',          pv: 'pv-chime',     extra: '<span class="b"></span><span class="b"></span>' },
    { n: '13', slug: '13-starchart',  cn: '星图',     en: 'Celestial',       mech: '连四星成阵 · 朱雀准 · 玄武驳。',        pv: 'pv-starchart', extra: '' },

    { n: '15', slug: '15-lantern',    cn: '宫灯',     en: 'Palace Lantern',  mech: '旋钮调灯 · 全亮为准 · 熄灭为驳。',      pv: 'pv-lantern',   extra: '' },
    { n: '16', slug: '16-scabbard',   cn: '剑鞘',     en: 'Sheath & Blade',  mech: '拔剑为驳 · 按剑归鞘为准。',              pv: 'pv-scabbard',  extra: '' },
    { n: '17', slug: '17-tea',        cn: '茶盘',     en: 'Tea Service',     mech: '携壶注御杯 · 碧则准 · 赤则驳。',        pv: 'pv-tea',       extra: '' },
    { n: '18', slug: '18-dragonball', cn: '龙珠',     en: 'Dragon Orb',      mech: '旋龙珠九十度 · 右准 · 左驳。',           pv: 'pv-dragonball',extra: '' },
    { n: '19', slug: '19-butterfly',  cn: '蝶引',     en: 'Butterfly',       mech: '引蝶栖花 · 金莲准 · 赤罂驳。',          pv: 'pv-butterfly', extra: '' },
    { n: '20', slug: '20-fortune',    cn: '签筒',     en: 'Fortune Sticks',  mech: '摇签筒 · 上上签准 · 下下签驳。',        pv: 'pv-fortune',   extra: '' }
  ];

  const grid = document.getElementById('grid');
  chambers.forEach(c => {
    const a = document.createElement('a');
    a.className = 'tile';
    a.href = `./${c.slug}/`;
    a.innerHTML = `
      <span class="num">${c.n}</span>
      <span class="badge">Chamber</span>
      <div class="preview ${c.pv} anim">${c.extra}</div>
      <div class="tile-info">
        <div>
          <div class="cn">${c.cn}</div>
          <div class="en">${c.en}</div>
        </div>
        <div class="mech">${c.mech}</div>
      </div>
    `;
    grid.appendChild(a);
  });

  document.getElementById('surprise').addEventListener('click', () => {
    const pick = chambers[Math.floor(Math.random() * chambers.length)];
    location.href = `./${pick.slug}/`;
  });
</script>
</body>

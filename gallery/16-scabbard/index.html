<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0604">
<title>剑鞘 · Sheath & Blade</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%E2%9A%94%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background:
      radial-gradient(ellipse at 50% 40%, #2a1a0f 0%, #0a0604 70%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    text-align: center;
    width: 100%;
    max-width: 600px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .request {
    margin-bottom: 24px;
  }
  .request .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 8px; }
  .request .intent { font-family: var(--font-brush); font-size: 22px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 10px; }
  .request .reason { font-size: 13px; color: #b4a080; line-height: 1.7; font-style: italic; max-width: 460px; margin: 0 auto 10px; }

  .weapon-wrap {
    position: relative;
    width: 100px;
    height: 460px;
    margin: 20px auto;
  }

  .scabbard {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 60px;
    height: 380px;
    background:
      linear-gradient(90deg, #3b2812 0%, #7a5510 50%, #3b2812 100%);
    border: 2px solid #8b6510;
    border-radius: 4px 4px 16px 16px;
    box-shadow: inset -4px 0 12px rgba(0, 0, 0, 0.4), 0 8px 20px rgba(0, 0, 0, 0.5);
    z-index: 1;
  }
  .scabbard::before {
    content: '';
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 40%;
    height: 10px;
    background: linear-gradient(90deg, #e9c36b, #8b6510);
    border-radius: 2px;
  }
  .scabbard::after {
    content: '';
    position: absolute;
    top: 200px;
    left: 50%;
    transform: translateX(-50%);
    width: 40%;
    height: 10px;
    background: linear-gradient(90deg, #e9c36b, #8b6510);
    border-radius: 2px;
  }

  .scabbard-mouth {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 20px;
    background: linear-gradient(90deg, #8b6510, #e9c36b, #8b6510);
    border-radius: 4px 4px 0 0;
    z-index: 2;
  }

  .sword {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translate(-50%, var(--out, 0px));
    width: 80px;
    z-index: 3;
    cursor: grab;
    user-select: none;
    transition: transform 0.1s;
  }
  .sword:active { cursor: grabbing; }
  .sword.committing { transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.3, 1); }

  .blade {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 360px;
    background:
      linear-gradient(90deg, #8a9abf 0%, #e0e6f0 40%, #fff 50%, #e0e6f0 60%, #5a6a8f 100%);
    border-radius: 2px 2px 4px 4px;
    clip-path: polygon(50% 0, 100% 3%, 100% 95%, 50% 100%, 0 95%, 0 3%);
    box-shadow: 0 0 10px rgba(200, 210, 240, 0.3);
  }

  .guard {
    position: absolute;
    top: 360px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 10px;
    background: linear-gradient(180deg, #e9c36b 0%, #5a3a08 100%);
    border-radius: 2px;
    z-index: 4;
  }

  .handle {
    position: absolute;
    top: 370px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 70px;
    background:
      repeating-linear-gradient(
        180deg,
        #8b1a1a 0 4px,
        #3b0808 4px 8px
      );
    border: 1px solid #1a0f06;
    border-radius: 2px;
    z-index: 5;
  }
  .handle::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 12px;
    background: linear-gradient(180deg, #e9c36b 0%, #5a3a08 100%);
    border-radius: 2px;
  }

  .labels {
    display: flex;
    gap: 40px;
    justify-content: center;
    margin-top: 30px;
  }
  .labels div {
    font-family: var(--font-brush);
    font-size: 14px;
    letter-spacing: 3px;
  }
  .labels .out { color: var(--wax-hi); }
  .labels .in { color: var(--gold-hi); }

  .instruction {
    margin-top: 30px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
  }

  .steel-glow {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: 100%;
    background: radial-gradient(ellipse at 50% 30%, rgba(200, 210, 240, 0.4), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .steel-glow.on { opacity: 1; }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">剑鞘</div><div class="en">Sheath & Blade</div></div>

<div class="stage">
  <div class="request req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
  </div>

  <div class="weapon-wrap">
    <div class="steel-glow" id="glow"></div>
    <div class="scabbard"></div>
    <div class="scabbard-mouth"></div>
    <div class="sword" id="sword">
      <div class="blade"></div>
      <div class="guard"></div>
      <div class="handle"></div>
    </div>
  </div>

  <div class="labels">
    <div class="out">出鞘 · 驳</div>
    <div class="in">归鞘 · 准</div>
  </div>

  <div class="instruction">拔剑出鞘为驳 · 按剑归鞘为准</div>
</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  const sword = document.getElementById('sword');
  const glow = document.getElementById('glow');
  let out = 0; // pixels out; negative means pushed in
  let startY = 0;
  let startOut = 0;
  let dragging = false;
  let committed = false;

  function update() {
    sword.style.setProperty('--out', out + 'px');
    glow.classList.toggle('on', out < -40);
  }

  function start(e) {
    if (committed) return;
    dragging = true;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    startY = y;
    startOut = out;
    sword.classList.remove('committing');
    e.preventDefault();
  }
  function move(e) {
    if (!dragging) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    out = Math.min(30, Math.max(-300, startOut + (y - startY)));
    update();
    if (out < -240 && !committed) {
      // Drawn fully — reject
      committed = true;
      sword.classList.add('committing');
      out = -340;
      update();
      setTimeout(() => window.cast('reject'), 500);
    } else if (out > 20 && !committed && startOut < 0) {
      // Pushed back in — approve
      committed = true;
      sword.classList.add('committing');
      out = 0;
      update();
      setTimeout(() => window.cast('approve'), 500);
    }
  }
  function end() {
    if (!dragging || committed) { dragging = false; return; }
    dragging = false;
  }

  sword.addEventListener('mousedown', start);
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', end);
  sword.addEventListener('touchstart', start, { passive: false });
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', end);

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
  }
  loadReq();

  window.nextRequest = () => {
    committed = false;
    out = 0;
    sword.classList.remove('committing');
    update();
    loadReq();
  };
</script>
</body>
</html>

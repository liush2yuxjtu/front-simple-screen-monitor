<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0606">
<title>宫灯 · Palace Lantern</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%F0%9F%8F%AE%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background: radial-gradient(ellipse at 50% 30%, #3b1a12 0%, #0a0604 70%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    text-align: center;
    width: 100%;
    max-width: 640px;
    padding: 20px;
  }

  .request {
    margin-bottom: 30px;
  }
  .request .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 8px; }
  .request .intent { font-family: var(--font-brush); font-size: 22px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 10px; }
  .request .reason { font-size: 13px; color: #b4a080; line-height: 1.7; font-style: italic; max-width: 460px; margin: 0 auto 10px; }

  .lantern-wrap {
    position: relative;
    width: 240px;
    height: 320px;
    margin: 20px auto;
  }

  .hook {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 30px;
    border: 3px solid var(--gold);
    border-bottom: none;
    border-radius: 50% 50% 0 0;
  }

  .rope {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 30px;
    background: linear-gradient(180deg, #3b2812 0%, #1a0f06 100%);
  }

  .cap {
    position: absolute;
    top: 54px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 12px;
    background: linear-gradient(180deg, #b8892a 0%, #5a3a08 100%);
    border-radius: 4px;
  }

  .body {
    position: absolute;
    top: 66px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 200px;
    background:
      radial-gradient(ellipse at 50% 40%, var(--lantern-fill, #ff6a3a) 0%, #c02a2a 60%, #7a1010 100%);
    border: 4px solid var(--gold);
    border-radius: 50% 50% 20% 20% / 40% 40% 30% 30%;
    box-shadow:
      inset 0 -12px 30px rgba(0, 0, 0, 0.5),
      0 0 var(--glow, 40px) var(--glow-color, rgba(255, 120, 40, 0.5));
    animation: sway 4s ease-in-out infinite alternate;
    transform-origin: 50% -30px;
  }
  @keyframes sway {
    0% { transform: translateX(-50%) rotate(-1.5deg); }
    100% { transform: translateX(-50%) rotate(1.5deg); }
  }

  .body::before, .body::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 6px;
    background: linear-gradient(180deg, #b8892a 0%, #5a3a08 100%);
    border-radius: 3px;
  }
  .body::before { left: 12%; }
  .body::after { right: 12%; }

  .body .char {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-brush);
    font-size: 48px;
    color: #2a0808;
    letter-spacing: 3px;
    text-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
    z-index: 2;
  }

  .tassel {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 40px;
    background:
      linear-gradient(180deg, #e9c36b 0%, #b8892a 100%);
    border-radius: 4px 4px 0 0;
    clip-path: polygon(0 0, 100% 0, 95% 100%, 85% 100%, 80% 50%, 60% 100%, 50% 100%, 45% 50%, 20% 100%, 10% 50%, 5% 100%, 0 100%);
  }

  .dial {
    position: relative;
    margin: 40px auto 0;
    width: 180px;
    height: 180px;
  }

  .dial-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: radial-gradient(circle at 30% 30%, rgba(232, 195, 107, 0.1), transparent 60%);
  }

  .dial-ticks {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
  .dial-ticks span {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2px;
    height: 10px;
    background: var(--gold);
    transform-origin: 1px 80px;
  }

  .dial-knob {
    position: absolute;
    inset: 16%;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #e9c36b 0%, #8b6510 60%, #3b2812 100%);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6), inset 0 4px 8px rgba(255, 220, 160, 0.2);
    cursor: grab;
    transition: transform 0.1s;
    transform: rotate(var(--rot, 0deg));
    user-select: none;
  }
  .dial-knob:active { cursor: grabbing; }
  .dial-knob::after {
    content: '';
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 20px;
    background: #1a0f06;
    border-radius: 2px;
  }

  .dial-labels {
    position: absolute;
    inset: -30px;
    font-family: var(--font-brush);
    font-size: 14px;
    letter-spacing: 3px;
    pointer-events: none;
  }
  .dial-labels .dim {
    position: absolute;
    left: -10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--wax-hi);
  }
  .dial-labels .bright {
    position: absolute;
    right: -10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold-hi);
  }

  .instruction {
    margin-top: 30px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">宫灯</div><div class="en">Palace Lantern</div></div>

<div class="stage">
  <div class="request req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
  </div>

  <div class="lantern-wrap">
    <div class="hook"></div>
    <div class="rope"></div>
    <div class="cap"></div>
    <div class="body" id="body">
      <div class="char" id="char">福</div>
    </div>
    <div class="tassel"></div>
  </div>

  <div class="dial">
    <div class="dial-ring"></div>
    <div class="dial-ticks" id="ticks"></div>
    <div class="dial-knob" id="knob"></div>
    <div class="dial-labels">
      <span class="dim">灭 · 驳</span>
      <span class="bright">亮 · 准</span>
    </div>
  </div>

  <div class="instruction">旋钮调灯 · 全亮为准 · 熄灭为驳</div>
</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  const knob = document.getElementById('knob');
  const body = document.getElementById('body');
  const char = document.getElementById('char');
  const ticksEl = document.getElementById('ticks');
  let angle = 0; // -90 dim, 90 bright
  let committed = false;
  let dragging = false;

  for (let i = 0; i < 12; i++) {
    const s = document.createElement('span');
    s.style.transform = `translate(-50%, 0) rotate(${i * 30 - 180}deg)`;
    ticksEl.appendChild(s);
  }

  function update() {
    knob.style.setProperty('--rot', angle + 'deg');
    const t = (angle + 90) / 180; // 0..1
    const warm = `hsl(${Math.max(0, 20 + t * 20)}, ${Math.min(100, 60 + t * 40)}%, ${Math.max(20, 30 + t * 40)}%)`;
    body.style.setProperty('--lantern-fill', warm);
    body.style.setProperty('--glow', (t * 80) + 'px');
    body.style.setProperty('--glow-color', `rgba(255, 150, 60, ${t * 0.8})`);
    char.style.color = t > 0.4 ? '#2a0808' : '#1a0f06';
  }
  update();

  function start(e) {
    if (committed) return;
    dragging = true;
    e.preventDefault();
  }
  function move(e) {
    if (!dragging) return;
    const rect = knob.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - cx;
    const dy = pt.clientY - cy;
    const a = Math.atan2(dy, dx) * 180 / Math.PI;
    // Map -180..180 to -90..90 (clamp)
    angle = Math.max(-90, Math.min(90, a + 90));
    update();
  }
  function end() {
    if (!dragging || committed) { dragging = false; return; }
    dragging = false;
    if (angle > 75) {
      committed = true;
      setTimeout(() => window.cast('approve'), 500);
    } else if (angle < -75) {
      committed = true;
      setTimeout(() => window.cast('reject'), 500);
    }
  }

  knob.addEventListener('mousedown', start);
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', end);
  knob.addEventListener('touchstart', start, { passive: false });
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', end);

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
  }
  loadReq();

  window.nextRequest = () => {
    committed = false;
    angle = 0;
    update();
    loadReq();
  };
</script>
</body>
</html>

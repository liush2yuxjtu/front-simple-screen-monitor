<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0604">
<title>烽火 · Beacon Tower</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background:
      radial-gradient(ellipse at 50% 100%, #3b1206 0%, #1a0a04 40%, #000 100%);
  }

  .night {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 10%, rgba(200, 220, 255, 0.05), transparent 40%);
  }
  .night::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 15%, #fff, transparent),
      radial-gradient(1px 1px at 25% 40%, #fff, transparent),
      radial-gradient(1px 1px at 45% 10%, #fff, transparent),
      radial-gradient(1px 1px at 75% 30%, #fff, transparent),
      radial-gradient(1px 1px at 90% 55%, #fff, transparent),
      radial-gradient(1px 1px at 60% 20%, #fff, transparent),
      radial-gradient(1px 1px at 35% 70%, #fff, transparent);
    opacity: 0.6;
    background-size: 100% 100%;
  }

  .stage {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 20px 20px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .request {
    max-width: 520px;
    margin: 0 auto 30px;
    padding: 18px 24px;
    background: rgba(10, 6, 4, 0.6);
    border: 1px solid rgba(184, 137, 42, 0.3);
    backdrop-filter: blur(14px);
  }
  .request .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 8px; }
  .request .intent { font-family: var(--font-brush); font-size: 20px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 8px; }
  .request .reason { font-size: 12px; color: #b4a080; line-height: 1.6; font-style: italic; }

  .tower-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .tower {
    position: relative;
    width: 180px;
    height: 380px;
  }

  .brazier {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 60px;
    background: linear-gradient(180deg, #3b2812 0%, #1a0f06 100%);
    border: 1px solid #7a5510;
    border-radius: 4px;
    box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.6);
  }

  .fire {
    position: absolute;
    left: 50%;
    bottom: 55px;
    transform: translateX(-50%);
    width: 80px;
    height: 0;
    transition: height 0.2s, filter 0.3s;
    pointer-events: none;
  }
  .flame {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 60px;
    height: 100%;
    background:
      radial-gradient(ellipse at 50% 90%, #ffcf4a 0%, #ff7a2a 40%, #c02a2a 70%, transparent 100%);
    border-radius: 50% 50% 30% 30%;
    filter: blur(2px);
    animation: flicker 0.3s ease-in-out infinite alternate;
    transform-origin: center bottom;
  }
  .flame::after {
    content: '';
    position: absolute;
    inset: 10% 20%;
    background: radial-gradient(ellipse at 50% 80%, #fff6c0 0%, #ffcf4a 50%, transparent 80%);
    border-radius: 50%;
    filter: blur(1px);
  }
  @keyframes flicker {
    0% { transform: translateX(-50%) scaleY(1) scaleX(1); }
    100% { transform: translateX(-52%) scaleY(1.06) scaleX(0.94); }
  }

  .glow {
    position: absolute;
    left: 50%;
    bottom: 50px;
    transform: translate(-50%, 0);
    width: 400px;
    height: 400px;
    pointer-events: none;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 140, 40, 0.4) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .column {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 320px;
    background:
      linear-gradient(180deg, #6a4828 0%, #3b2812 100%);
    border-radius: 2px;
    box-shadow: inset -6px 0 8px rgba(0, 0, 0, 0.4), inset 6px 0 8px rgba(255, 180, 100, 0.1);
  }
  .column::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(180deg, transparent 0 30px, rgba(0, 0, 0, 0.3) 30px 31px),
      repeating-linear-gradient(90deg, transparent 0 20px, rgba(0, 0, 0, 0.2) 20px 21px);
  }

  .knob {
    margin: 24px auto 0;
    position: relative;
    width: 260px;
    height: 64px;
  }

  .track {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 6px;
    margin-top: -3px;
    background: rgba(184, 137, 42, 0.2);
    border-radius: 3px;
  }
  .track::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0; bottom: 0;
    width: var(--fill, 0%);
    background: linear-gradient(90deg, #c02a2a, #ff7a2a, #ffcf4a);
    border-radius: 3px;
  }

  .handle-k {
    position: absolute;
    top: 50%;
    width: 40px;
    height: 40px;
    margin-top: -20px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #e9c36b, #8b6510);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
    cursor: grab;
    left: 0;
    transform: translateX(0);
    transition: none;
  }
  .handle-k:active { cursor: grabbing; }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 3px;
    color: #8a7650;
    margin-top: 10px;
    text-transform: uppercase;
  }

  .instruction {
    margin-top: 16px;
    padding-bottom: 20px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">烽火</div><div class="en">Beacon</div></div>
<div class="night"></div>

<div class="stage">
  <div class="request req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
    <div style="margin-top:6px;"><span class="req-risk" id="r-risk"></span></div>
  </div>

  <div class="tower-wrap">
    <div class="glow" id="glow"></div>
    <div class="tower">
      <div class="fire" id="fire"><div class="flame"></div></div>
      <div class="brazier"></div>
      <div class="column"></div>
    </div>
  </div>

  <div class="knob">
    <div class="track" id="track"></div>
    <div class="handle-k" id="handle"></div>
  </div>
  <div class="scale-labels">
    <span>灭 · Reject</span>
    <span>燃 · Approve</span>
  </div>

  <div class="instruction">拉至尽头 · 右则举烽 · 左则熄火</div>
</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  const handle = document.getElementById('handle');
  const track = document.getElementById('track');
  const fire = document.getElementById('fire');
  const glow = document.getElementById('glow');
  let pos = 0.5; // 0..1
  let dragging = false;
  let committed = false;

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
    const risk = document.getElementById('r-risk');
    risk.textContent = '风险 · ' + window.riskLabel(r.risk);
    risk.className = 'req-risk ' + r.risk;
  }
  loadReq();

  function update() {
    const w = track.offsetWidth - 40;
    handle.style.transform = `translateX(${pos * w}px)`;
    track.style.setProperty('--fill', (pos * 100) + '%');
    const intensity = Math.max(0, (pos - 0.3) * 1.4);
    fire.style.height = (intensity * 140) + 'px';
    fire.style.filter = `brightness(${1 + intensity * 0.5})`;
    glow.style.opacity = intensity;
  }
  requestAnimationFrame(update);

  function start(e) {
    if (committed) return;
    dragging = true;
    e.preventDefault();
  }
  function move(e) {
    if (!dragging) return;
    const rect = track.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    pos = Math.max(0, Math.min(1, x / rect.width));
    update();
  }
  function end() {
    if (!dragging || committed) { dragging = false; return; }
    dragging = false;
    if (pos > 0.85) {
      committed = true;
      setTimeout(() => window.cast('approve'), 500);
    } else if (pos < 0.15) {
      committed = true;
      // extinguish
      fire.style.height = '0';
      glow.style.opacity = 0;
      setTimeout(() => window.cast('reject'), 500);
    }
  }

  handle.addEventListener('mousedown', start);
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', end);
  handle.addEventListener('touchstart', start, { passive: false });
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', end);
  track.addEventListener('click', (e) => {
    if (committed) return;
    const rect = track.getBoundingClientRect();
    pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    update();
  });

  window.nextRequest = () => {
    committed = false;
    pos = 0.5;
    update();
    loadReq();
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0f06">
<title>茶盘 · Tea Service</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='88'%3E%F0%9F%8D%B5%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/base.css">
<style>
  body {
    background: radial-gradient(ellipse at center, #2a1a0f 0%, #0a0604 80%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    text-align: center;
    width: 100%;
    max-width: 680px;
    padding: 20px;
  }

  .request {
    margin-bottom: 30px;
  }
  .request .app { font-family: var(--font-display); font-size: 10px; letter-spacing: 4px; color: var(--gold-hi); text-transform: uppercase; margin-bottom: 8px; }
  .request .intent { font-family: var(--font-brush); font-size: 22px; color: var(--parch-hi); letter-spacing: 2px; line-height: 1.5; margin-bottom: 10px; }
  .request .reason { font-size: 13px; color: #b4a080; line-height: 1.7; font-style: italic; max-width: 460px; margin: 0 auto 10px; }

  .tray {
    position: relative;
    margin: 10px auto;
    width: 500px;
    max-width: 92vw;
    aspect-ratio: 2.5/1;
    background:
      linear-gradient(180deg, #5a3a08 0%, #2a1808 100%);
    border: 2px solid #8b6510;
    border-radius: 12px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6), inset 0 4px 10px rgba(255, 220, 160, 0.1);
    padding: 20px 30px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    align-items: end;
  }

  .tray::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(184, 137, 42, 0.3);
    border-radius: 8px;
    pointer-events: none;
  }

  .cup {
    position: relative;
    width: 90px;
    height: 80px;
    margin: 0 auto;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .cup:hover { transform: translateY(-6px); }

  .cup-body {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: linear-gradient(180deg, #f2e8d8 0%, #d4c8a8 100%);
    border: 2px solid #7a5510;
    border-radius: 0 0 50% 50% / 0 0 30% 30%;
    box-shadow: inset 0 -6px 10px rgba(0, 0, 0, 0.2);
  }
  .cup-body::after {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    height: 6px;
    background: #7a5510;
    border-radius: 2px;
  }

  .tea-liquid {
    position: absolute;
    bottom: 4px;
    left: 8px;
    right: 8px;
    height: var(--fill, 0%);
    max-height: 64%;
    transition: height 0.4s;
    border-radius: 0 0 50% 50% / 0 0 20% 20%;
  }
  .cup.approve .tea-liquid { background: linear-gradient(180deg, #7ab576 0%, #2d7a4a 100%); }
  .cup.reject .tea-liquid { background: linear-gradient(180deg, #d03a3a 0%, #8b1a1a 100%); }
  .cup.plain .tea-liquid { background: linear-gradient(180deg, #d4b068 0%, #8b6510 100%); }
  .cup.empty .tea-liquid { display: none; }

  .cup-label {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-brush);
    font-size: 14px;
    letter-spacing: 3px;
    white-space: nowrap;
  }
  .cup.approve .cup-label { color: #5ec083; }
  .cup.reject .cup-label { color: var(--wax-hi); }
  .cup.plain .cup-label { color: var(--gold-hi); }

  .pot-wrap {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 30px;
  }

  .pot {
    position: relative;
    width: 100px;
    height: 80px;
    cursor: grab;
    user-select: none;
    transition: transform 0.2s;
  }
  .pot:hover { transform: translateY(-4px); }
  .pot:active { cursor: grabbing; }
  .pot.dragging { position: fixed; z-index: 100; pointer-events: none; transform: scale(1.1) rotate(-20deg); }

  .pot-body {
    position: absolute;
    bottom: 0;
    left: 10%;
    right: 10%;
    height: 60%;
    background: var(--pot-color, #b8892a);
    border: 2px solid #3b2812;
    border-radius: 50% 50% 20% 20% / 40% 40% 30% 30%;
    box-shadow: inset -4px -4px 10px rgba(0, 0, 0, 0.4);
  }
  .pot-spout {
    position: absolute;
    right: -14px;
    bottom: 20%;
    width: 24px;
    height: 16px;
    background: var(--pot-color, #b8892a);
    border: 2px solid #3b2812;
    border-radius: 50% 4px 4px 50%;
    transform: rotate(-30deg);
  }
  .pot-handle {
    position: absolute;
    left: -16px;
    top: 30%;
    width: 20px;
    height: 26px;
    border: 3px solid var(--pot-color, #b8892a);
    border-right: none;
    border-radius: 50% 0 0 50%;
  }
  .pot-lid {
    position: absolute;
    top: 10%;
    left: 30%;
    right: 30%;
    height: 20px;
    background: var(--pot-color, #b8892a);
    border: 2px solid #3b2812;
    border-radius: 50% 50% 20% 20% / 80% 80% 20% 20%;
  }
  .pot-lid::after {
    content: '';
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3b2812;
  }

  .pot.green { --pot-color: #4a7a5a; }
  .pot.red { --pot-color: #8b3a3a; }

  .pot-label {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-brush);
    font-size: 13px;
    letter-spacing: 3px;
    white-space: nowrap;
  }
  .pot.green .pot-label { color: #7ab576; }
  .pot.red .pot-label { color: var(--wax-hi); }

  .cup.target {
    transform: scale(1.15) translateY(-8px);
    filter: drop-shadow(0 0 16px var(--gold-hi));
  }

  .instruction {
    margin-top: 50px;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(232, 195, 107, 0.55);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="chamber-name"><div class="cn">茶盘</div><div class="en">Tea Service</div></div>

<div class="stage">
  <div class="request req-card">
    <div class="app" id="r-app"></div>
    <div class="intent" id="r-intent"></div>
    <div class="reason" id="r-reason"></div>
  </div>

  <div class="tray">
    <div class="cup empty" id="cup">
      <div class="cup-body"><div class="tea-liquid"></div></div>
      <div class="cup-label">御杯</div>
    </div>
    <div class="cup plain">
      <div class="cup-body"><div class="tea-liquid" style="height:55%"></div></div>
      <div class="cup-label">茶</div>
    </div>
    <div class="cup plain">
      <div class="cup-body"><div class="tea-liquid" style="height:55%"></div></div>
      <div class="cup-label">茶</div>
    </div>
  </div>

  <div class="pot-wrap">
    <div class="pot green" data-kind="approve">
      <div class="pot-body"></div>
      <div class="pot-spout"></div>
      <div class="pot-handle"></div>
      <div class="pot-lid"></div>
      <div class="pot-label">碧螺 · 准</div>
    </div>
    <div class="pot red" data-kind="reject">
      <div class="pot-body"></div>
      <div class="pot-spout"></div>
      <div class="pot-handle"></div>
      <div class="pot-lid"></div>
      <div class="pot-label">赤砂 · 驳</div>
    </div>
  </div>

  <div class="instruction">携壶注御杯 · 碧则准 · 赤则驳</div>
</div>

<script src="../_shared/pool.js"></script>
<script src="../_shared/common.js"></script>
<script>
  const cup = document.getElementById('cup');
  const pots = document.querySelectorAll('.pot');
  let active = null;
  let offset = { x: 0, y: 0 };
  let committed = false;

  function start(e, p) {
    if (committed) return;
    active = p;
    const rect = p.getBoundingClientRect();
    const pt = e.touches ? e.touches[0] : e;
    offset = { x: pt.clientX - rect.left, y: pt.clientY - rect.top };
    p.classList.add('dragging');
    p.style.left = rect.left + 'px';
    p.style.top = rect.top + 'px';
    document.body.appendChild(p);
    e.preventDefault();
  }
  function move(e) {
    if (!active) return;
    const pt = e.touches ? e.touches[0] : e;
    active.style.left = (pt.clientX - offset.x) + 'px';
    active.style.top = (pt.clientY - offset.y) + 'px';
    const elem = document.elementFromPoint(pt.clientX, pt.clientY);
    if (elem && elem.closest('#cup')) cup.classList.add('target');
    else cup.classList.remove('target');
  }
  function end(e) {
    if (!active) return;
    const pt = e.changedTouches ? e.changedTouches[0] : e;
    const elem = document.elementFromPoint(pt.clientX, pt.clientY);
    if (elem && elem.closest('#cup')) {
      const kind = active.dataset.kind;
      cup.classList.remove('empty');
      cup.classList.add(kind === 'approve' ? 'approve' : 'reject');
      cup.querySelector('.tea-liquid').style.height = '60%';
      cup.querySelector('.cup-label').textContent = kind === 'approve' ? '碧盈 · 准' : '赤满 · 驳';
      committed = true;
      setTimeout(() => window.cast(kind), 900);
    }
    cup.classList.remove('target');
    active.classList.remove('dragging');
    active.style.cssText = '';
    document.querySelector('.pot-wrap').appendChild(active);
    active = null;
  }

  pots.forEach(p => {
    p.addEventListener('mousedown', (e) => start(e, p));
    p.addEventListener('touchstart', (e) => start(e, p), { passive: false });
  });
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mouseup', end);
  document.addEventListener('touchend', end);

  function loadReq() {
    const r = window.pickRequest();
    document.getElementById('r-app').textContent = r.app;
    document.getElementById('r-intent').textContent = r.intent;
    document.getElementById('r-reason').textContent = r.reason;
  }
  loadReq();

  window.nextRequest = () => {
    committed = false;
    cup.className = 'cup empty';
    cup.id = 'cup';
    cup.querySelector('.tea-liquid').style.height = '';
    cup.querySelector('.cup-label').textContent = '御杯';
    loadReq();
  };
</script>
</body>
</html>

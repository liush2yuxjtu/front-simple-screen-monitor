<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>锁屏意图助手 - Swipe Prototype</title>
  <style>
    :root {
      --bg-0: #030712;
      --bg-1: #08111f;
      --glass: rgba(255, 255, 255, 0.09);
      --glass-strong: rgba(255, 255, 255, 0.15);
      --line: rgba(255, 255, 255, 0.16);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.62);
      --soft: rgba(255, 255, 255, 0.36);
      --cyan: #6ee7ff;
      --lime: #b7ff5a;
      --red: #ff6b8a;
      --amber: #ffd166;
      --purple: #c4b5fd;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(110, 231, 255, 0.16), transparent 28%),
        radial-gradient(circle at 82% 28%, rgba(196, 181, 253, 0.13), transparent 26%),
        radial-gradient(circle at 50% 90%, rgba(183, 255, 90, 0.09), transparent 32%),
        linear-gradient(145deg, #020617, #07111f 48%, #020617);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .phone {
      width: min(390px, 94vw);
      height: min(844px, 96vh);
      position: relative;
      overflow: hidden;
      border-radius: 44px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 22%),
        radial-gradient(circle at 55% 18%, rgba(110, 231, 255, 0.12), transparent 28%),
        linear-gradient(160deg, var(--bg-1), var(--bg-0));
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.62),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 12px;
      left: 50%;
      width: 126px;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      z-index: 20;
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.14;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
      pointer-events: none;
    }

    .statusbar {
      position: absolute;
      top: 22px;
      left: 28px;
      right: 28px;
      height: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      z-index: 30;
      color: rgba(255,255,255,0.86);
    }

    .signals {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .pill-signal {
      width: 28px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.55);
      position: relative;
    }

    .pill-signal::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 18px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
    }

    .header {
      position: absolute;
      top: 88px;
      left: 28px;
      right: 28px;
      z-index: 5;
    }

    .time {
      font-size: 76px;
      line-height: 0.9;
      font-weight: 760;
      letter-spacing: -0.075em;
      text-shadow: 0 18px 42px rgba(0,0,0,0.42);
    }

    .date {
      margin-top: 12px;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .assistant-chip {
      margin-top: 26px;
      width: fit-content;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      color: rgba(255,255,255,0.76);
      font-size: 12px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0 0 rgba(110, 231, 255, 0.6);
      animation: pulse 1.7s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(110, 231, 255, 0.58); }
      70% { box-shadow: 0 0 0 10px rgba(110, 231, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(110, 231, 255, 0); }
    }

    .stack-zone {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 82px;
      height: 408px;
      z-index: 10;
      perspective: 1200px;
    }

    .card {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 330px;
      padding: 22px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.19), rgba(255,255,255,0.075)),
        radial-gradient(circle at 18% 12%, rgba(110,231,255,0.16), transparent 34%),
        radial-gradient(circle at 90% 90%, rgba(196,181,253,0.16), transparent 42%);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow:
        0 28px 50px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255,255,255,0.18);
      backdrop-filter: blur(28px) saturate(150%);
      transform-origin: 50% 90%;
      transition: transform 260ms cubic-bezier(.2,.9,.2,1), opacity 260ms ease, filter 260ms ease;
      cursor: grab;
      overflow: hidden;
    }

    .card:active { cursor: grabbing; }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(130deg, rgba(255,255,255,0.18), transparent 18%, transparent 72%, rgba(255,255,255,0.08));
      opacity: 0.65;
    }

    .card[data-depth="1"] {
      transform: translateY(18px) scale(0.94);
      opacity: 0.62;
      filter: blur(0.3px);
    }

    .card[data-depth="2"] {
      transform: translateY(34px) scale(0.88);
      opacity: 0.36;
      filter: blur(1px);
    }

    .card[data-depth="3"] {
      transform: translateY(48px) scale(0.82);
      opacity: 0.18;
      filter: blur(1.6px);
    }

    .card.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .card-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .source {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }

    .appdot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 18px rgba(110,231,255,0.75);
    }

    .confidence {
      font-size: 11px;
      color: rgba(255,255,255,0.58);
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
    }

    .proposal-label {
      margin-top: 24px;
      position: relative;
      z-index: 1;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--cyan);
      font-weight: 700;
    }

    .action-title {
      margin-top: 10px;
      position: relative;
      z-index: 1;
      font-size: 32px;
      line-height: 1.08;
      letter-spacing: -0.045em;
      font-weight: 820;
    }

    .action-sub {
      margin-top: 14px;
      position: relative;
      z-index: 1;
      color: rgba(255,255,255,0.66);
      font-size: 15px;
      line-height: 1.45;
      max-width: 94%;
    }

    .micro-context {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 22px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      z-index: 1;
    }

    .context-item {
      min-height: 54px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(0,0,0,0.17);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .context-k {
      color: rgba(255,255,255,0.46);
      font-size: 10px;
      margin-bottom: 5px;
    }

    .context-v {
      color: rgba(255,255,255,0.82);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 650;
    }

    .gesture-hints {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 32px;
      height: 34px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 7px;
      z-index: 12;
    }

    .hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.54);
      font-size: 10px;
      backdrop-filter: blur(14px);
    }

    .hint strong {
      color: rgba(255,255,255,0.82);
      font-weight: 750;
    }

    .decision-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: opacity 120ms ease;
    }

    .decision-copy {
      position: absolute;
      top: 318px;
      left: 28px;
      right: 28px;
      text-align: center;
      font-size: 18px;
      font-weight: 780;
      letter-spacing: -0.02em;
      text-shadow: 0 10px 28px rgba(0,0,0,0.6);
    }

    .decision-copy small {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      letter-spacing: 0;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 16px;
      min-width: 230px;
      text-align: center;
      border-radius: 999px;
      background: rgba(0,0,0,0.48);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      color: rgba(255,255,255,0.86);
      font-size: 13px;
      opacity: 0;
      z-index: 40;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .detail-sheet {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 18px;
      padding: 20px;
      border-radius: 32px;
      background: rgba(8, 15, 28, 0.86);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(28px) saturate(140%);
      box-shadow: 0 28px 70px rgba(0,0,0,0.62);
      z-index: 45;
      transform: translateY(116%);
      transition: transform 360ms cubic-bezier(.2,.9,.2,1);
    }

    .detail-sheet.show {
      transform: translateY(0);
    }

    .sheet-grabber {
      width: 42px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      margin: 0 auto 18px;
    }

    .sheet-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.035em;
      margin-bottom: 12px;
    }

    .sheet-text {
      color: rgba(255,255,255,0.66);
      font-size: 14px;
      line-height: 1.55;
    }

    .route-line {
      margin-top: 18px;
      display: grid;
      gap: 9px;
    }

    .route-step {
      padding: 12px 13px;
      border-radius: 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      font-size: 13px;
    }

    .sheet-tip {
      margin-top: 16px;
      color: rgba(255,255,255,0.42);
      font-size: 12px;
      text-align: center;
    }

    .empty-state {
      position: absolute;
      left: 26px;
      right: 26px;
      bottom: 218px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 320ms ease, transform 320ms ease;
      z-index: 6;
    }

    .empty-state.show {
      opacity: 1;
      transform: translateY(0);
    }

    .empty-icon {
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 34px;
    }

    .empty-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .empty-sub {
      margin-top: 9px;
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-height: 760px) {
      .phone { height: 96vh; }
      .time { font-size: 62px; }
      .header { top: 76px; }
      .stack-zone { bottom: 68px; height: 370px; }
      .card { height: 305px; }
      .gesture-hints { bottom: 24px; }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="锁屏意图助手原型">
    <div class="noise"></div>

    <div class="statusbar">
      <div>13:42</div>
      <div class="signals">
        <span>5G</span>
        <span class="pill-signal"></span>
      </div>
    </div>

    <section class="header">
      <div class="time">13:42</div>
      <div class="date">4月27日 周一 · 锁屏</div>
      <div class="assistant-chip">
        <span class="pulse"></span>
        <span>正在把通知流转成行动提案</span>
      </div>
    </section>

    <section class="stack-zone" id="stack"></section>

    <section class="gesture-hints" id="hints">
      <div class="hint"><strong>←</strong>丢掉</div>
      <div class="hint"><strong>→</strong>执行</div>
      <div class="hint"><strong>↑</strong>细节</div>
      <div class="hint"><strong>↓</strong>稍后</div>
    </section>

    <section class="decision-overlay" id="overlay">
      <div class="decision-copy" id="decisionCopy"></div>
    </section>

    <section class="detail-sheet" id="sheet">
      <div class="sheet-grabber"></div>
      <div class="sheet-title" id="sheetTitle"></div>
      <div class="sheet-text" id="sheetText"></div>
      <div class="route-line" id="sheetSteps"></div>
      <div class="sheet-tip">下滑或点击空白区域收起</div>
    </section>

    <section class="empty-state" id="empty">
      <div class="empty-icon">✓</div>
      <div class="empty-title">行动流已清空</div>
      <div class="empty-sub">没有更多需要你现在判断的主卡片。</div>
    </section>

    <div class="toast" id="toast"></div>
  </main>

  <script>
    const proposals = [
      {
        source: "微信 · 朋友已到站",
        confidence: "高置信",
        label: "当前最可能行动",
        title: "去北京北站网约车乘车点接人。",
        sub: "系统推测你不是要读消息，而是要立刻处理接人路径。",
        ctx: [
          ["地点", "北京北站"],
          ["动作", "接人 / 打车"],
          ["时机", "现在"],
        ],
        detail: "来自微信通知、当前位置和时间窗口的组合判断：对方已经到站，你现在最需要的是找到乘车点并完成接人，而不是继续读聊天记录。",
        steps: ["打开地图到“北京北站网约车上车点”", "同时保留微信快捷回复", "到达附近后提醒你发送定位"],
        execute: "已进入：北京北站网约车乘车点路线"
      },
      {
        source: "飞书 · 会议即将开始",
        confidence: "中高置信",
        label: "下一步行动提案",
        title: "打开会议链接并静音入会。",
        sub: "会议通知和日程重合，当前最可能动作是入会，而不是查看通知。",
        ctx: [
          ["App", "飞书"],
          ["动作", "入会"],
          ["剩余", "2 分钟"],
        ],
        detail: "会议开始前 2 分钟，飞书提醒和日历事件重合。系统将它判断为一个即时执行动作：进入会议、默认静音、准备听会。",
        steps: ["打开会议链接", "默认关闭麦克风", "浮层保留会议标题"],
        execute: "已准备：静音入会"
      },
      {
        source: "外卖 · 骑手即将到达",
        confidence: "高置信",
        label: "当前最可能行动",
        title: "查看骑手位置，准备下楼取餐。",
        sub: "这不是外卖摘要，而是一个 3 分钟内要发生的动作。",
        ctx: [
          ["距离", "约 300m"],
          ["动作", "取餐"],
          ["状态", "即将到达"],
        ],
        detail: "外卖通知显示骑手接近，结合常用取餐地点，系统判断你现在更需要准备取餐，而不是打开外卖详情页慢慢看。",
        steps: ["显示骑手当前位置", "提醒带门禁卡", "3 分钟后再次震动"],
        execute: "已打开：骑手实时位置"
      },
      {
        source: "短信 · 验证码",
        confidence: "中置信",
        label: "下一步行动提案",
        title: "把验证码填入刚才的登录页面。",
        sub: "检测到你刚在网页登录，验证码不是消息，而是待完成动作。",
        ctx: [
          ["来源", "短信"],
          ["动作", "填入"],
          ["窗口", "60 秒"],
        ],
        detail: "短信验证码与刚才的网页登录行为在时间上高度相关。系统把它转成一个填入动作，而不是让你手动复制。",
        steps: ["复制验证码", "返回上一个 App", "自动聚焦输入框"],
        execute: "已复制验证码并返回登录页"
      }
    ];

    const stack = document.getElementById('stack');
    const overlay = document.getElementById('overlay');
    const decisionCopy = document.getElementById('decisionCopy');
    const toast = document.getElementById('toast');
    const sheet = document.getElementById('sheet');
    const sheetTitle = document.getElementById('sheetTitle');
    const sheetText = document.getElementById('sheetText');
    const sheetSteps = document.getElementById('sheetSteps');
    const empty = document.getElementById('empty');
    const hints = document.getElementById('hints');

    let queue = [...proposals];
    let activeCard = null;
    let startX = 0;
    let startY = 0;
    let currentX = 0;
    let currentY = 0;
    let dragging = false;
    let toastTimer = null;

    function renderStack() {
      stack.innerHTML = '';
      const visible = queue.slice(0, 4);

      visible.forEach((item, index) => {
        const card = document.createElement('article');
        card.className = 'card';
        card.dataset.depth = index;
        card.innerHTML = `
          <div class="card-topline">
            <div class="source"><span class="appdot"></span>${item.source}</div>
            <div class="confidence">${item.confidence}</div>
          </div>
          <div class="proposal-label">${item.label}</div>
          <div class="action-title">${item.title}</div>
          <div class="action-sub">${item.sub}</div>
          <div class="micro-context">
            ${item.ctx.map(([k, v]) => `
              <div class="context-item">
                <div class="context-k">${k}</div>
                <div class="context-v">${v}</div>
              </div>
            `).join('')}
          </div>
        `;

        if (index === 0) {
          card.addEventListener('pointerdown', onPointerDown);
          activeCard = card;
        }

        stack.appendChild(card);
      });

      if (!queue.length) {
        empty.classList.add('show');
        hints.style.opacity = '0';
      }
    }

    function onPointerDown(e) {
      if (sheet.classList.contains('show')) return;
      dragging = true;
      startX = e.clientX;
      startY = e.clientY;
      currentX = 0;
      currentY = 0;
      activeCard = e.currentTarget;
      activeCard.setPointerCapture(e.pointerId);
      activeCard.style.transition = 'none';
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp, { once: true });
    }

    function onPointerMove(e) {
      if (!dragging || !activeCard) return;
      currentX = e.clientX - startX;
      currentY = e.clientY - startY;
      const rotate = currentX / 18;
      activeCard.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg)`;
      updateOverlay(currentX, currentY);
    }

    function onPointerUp() {
      if (!dragging || !activeCard) return;
      dragging = false;
      window.removeEventListener('pointermove', onPointerMove);

      const absX = Math.abs(currentX);
      const absY = Math.abs(currentY);
      const threshold = 96;

      if (absX < threshold && absY < threshold) {
        resetCard();
        return;
      }

      if (absX > absY) {
        currentX > 0 ? decide('execute') : decide('discard');
      } else {
        currentY < 0 ? decide('detail') : decide('later');
      }
    }

    function updateOverlay(x, y) {
      const absX = Math.abs(x);
      const absY = Math.abs(y);
      const intensity = Math.min(Math.max(Math.max(absX, absY) / 130, 0), 1);
      overlay.style.opacity = intensity;

      if (absX > absY) {
        if (x > 0) {
          overlay.style.background = `linear-gradient(90deg, rgba(183,255,90,${0.28 * intensity}), transparent 58%)`;
          decisionCopy.innerHTML = `执行这张行动提案<small>右滑进入下一步</small>`;
        } else {
          overlay.style.background = `linear-gradient(270deg, rgba(255,107,138,${0.28 * intensity}), transparent 58%)`;
          decisionCopy.innerHTML = `丢掉这张卡<small>左滑，不再打扰</small>`;
        }
      } else {
        if (y < 0) {
          overlay.style.background = `linear-gradient(0deg, rgba(110,231,255,${0.26 * intensity}), transparent 58%)`;
          decisionCopy.innerHTML = `展开细节<small>上滑，看判断依据</small>`;
        } else {
          overlay.style.background = `linear-gradient(180deg, rgba(255,209,102,${0.24 * intensity}), transparent 58%)`;
          decisionCopy.innerHTML = `稍后再处理<small>下滑，放回队列末尾</small>`;
        }
      }
    }

    function resetCard() {
      if (!activeCard) return;
      activeCard.style.transition = 'transform 260ms cubic-bezier(.2,.9,.2,1)';
      activeCard.style.transform = '';
      overlay.style.opacity = 0;
    }

    function decide(type) {
      const item = queue[0];
      if (!item || !activeCard) return;

      overlay.style.opacity = 0;
      activeCard.style.transition = 'transform 260ms ease, opacity 240ms ease';

      if (type === 'execute') {
        activeCard.style.transform = 'translate(460px, -20px) rotate(18deg)';
        activeCard.style.opacity = '0';
        showToast(item.execute);
        shiftQueue();
      }

      if (type === 'discard') {
        activeCard.style.transform = 'translate(-460px, -16px) rotate(-18deg)';
        activeCard.style.opacity = '0';
        showToast('已丢掉：这张行动提案');
        shiftQueue();
      }

      if (type === 'later') {
        activeCard.style.transform = 'translateY(420px) scale(0.92)';
        activeCard.style.opacity = '0';
        showToast('已放到卡堆末尾');
        const first = queue.shift();
        queue.push(first);
        setTimeout(renderStack, 230);
      }

      if (type === 'detail') {
        resetCard();
        openSheet(item);
      }
    }

    function shiftQueue() {
      queue.shift();
      setTimeout(renderStack, 230);
    }

    function openSheet(item) {
      sheetTitle.textContent = item.title;
      sheetText.textContent = item.detail;
      sheetSteps.innerHTML = item.steps.map(step => `<div class="route-step">${step}</div>`).join('');
      sheet.classList.add('show');
    }

    function closeSheet() {
      sheet.classList.remove('show');
    }

    function showToast(text) {
      clearTimeout(toastTimer);
      toast.textContent = text;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    document.querySelector('.phone').addEventListener('click', (e) => {
      if (sheet.classList.contains('show') && !sheet.contains(e.target)) closeSheet();
    });

    let sheetStartY = 0;
    sheet.addEventListener('pointerdown', (e) => {
      sheetStartY = e.clientY;
    });

    sheet.addEventListener('pointerup', (e) => {
      if (e.clientY - sheetStartY > 70) closeSheet();
    });

    renderStack();
  </script>
</body>
</html>

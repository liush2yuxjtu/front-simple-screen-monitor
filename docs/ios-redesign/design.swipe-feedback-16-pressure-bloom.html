<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Pressure Bloom</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#180f09;--panel:rgba(217,154,88,.13);--line:rgba(255,229,198,.2);--text:#fff4e6;--muted:rgba(255,244,230,.72);--accent:#d99a58}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.feedback{position:absolute;right:36px;top:330px;width:138px;height:138px;border-radius:50%;border:12px solid var(--accent);box-shadow:0 0 60px var(--accent)}.demo{position:absolute;left:72px;right:54px;top:306px;transform:translateX(46px) rotate(5deg);padding:24px;border-radius:30px;background:rgba(255,255,255,.14);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Pressure Bloom</h1><p class="lede">执行反馈从右侧目标区开花。用户松手前能看到方向、力度和提交结果。</p><ul class="bullet-list"><li>方向：右滑执行。</li><li>清晰点：热区扩大成完整光环。</li><li>适合：高信心、低风险、即时执行动作。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">执行 78%</span></div><div class="hero"><div class="hero-kicker">EXECUTE</div><div class="hero-title">Bloom</div></div><div class="feedback"></div><div class="demo"><h2>北京北站行动提案</h2><p>右侧热量已过阈值，松手执行。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

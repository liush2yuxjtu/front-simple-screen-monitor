<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Calendar Sink</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#17190c;--panel:rgba(177,201,111,.13);--line:rgba(238,255,198,.2);--text:#fbffe8;--muted:rgba(251,255,232,.72);--accent:#b1c96f}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.cells{position:absolute;left:50px;right:50px;bottom:82px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.cells i{height:48px;border-radius:14px;background:rgba(177,201,111,.32);border:1px solid var(--line)}.demo{position:absolute;left:64px;right:64px;top:320px;transform:translateY(48px);padding:24px;border-radius:30px;background:rgba(255,255,255,.12);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Calendar Sink</h1><p class="lede">卡片下沉到日历格里。用户会理解稍后等于重新排程。</p><ul class="bullet-list"><li>方向：下滑稍后。</li><li>清晰点：日历格吸收卡片。</li><li>适合：和时间相关的行动提案。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">稍后 78%</span></div><div class="hero"><div class="hero-kicker">LATER</div><div class="hero-title">Calendar</div></div><div class="demo"><h2>北京北站行动提案</h2><p>已对齐日历槽，松手稍后。</p></div><div class="cells"><i></i><i></i><i></i><i></i><i></i></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

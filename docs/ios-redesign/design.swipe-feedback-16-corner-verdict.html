<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Corner Verdict</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#190d0d;--panel:rgba(232,92,82,.13);--line:rgba(255,206,202,.2);--text:#fff4e6;--muted:rgba(255,244,230,.72);--accent:#e85c52}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.stamp{position:absolute;left:70px;top:270px;padding:14px 18px;border:3px solid var(--accent);transform:rotate(-13deg);font:900 18px/1 var(--ui-font)}.demo{position:absolute;left:52px;right:86px;top:330px;transform:translateX(-42px) rotate(-5deg);padding:24px;border-radius:30px;background:rgba(255,255,255,.14);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Corner Verdict</h1><p class="lede">丢弃像盖章裁决。左上角先给出结论，再让卡片离场。</p><ul class="bullet-list"><li>方向：左滑丢掉。</li><li>清晰点：判决章提前出现。</li><li>适合：需要减少误删焦虑的提案。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">丢掉 78%</span></div><div class="hero"><div class="hero-kicker">DISCARD</div><div class="hero-title">Verdict</div></div><div class="stamp">丢掉</div><div class="demo"><h2>北京北站行动提案</h2><p>左滑判决已锁定，松手归档。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

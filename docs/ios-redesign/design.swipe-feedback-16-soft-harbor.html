<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Soft Harbor</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#0f1713;--panel:rgba(126,199,162,.13);--line:rgba(214,255,235,.2);--text:#f1fff8;--muted:rgba(241,255,248,.72);--accent:#7ec7a2}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.harbor{position:absolute;left:62px;right:62px;bottom:74px;height:96px;border-radius:52px 52px 22px 22px;background:radial-gradient(circle at 50% 0,var(--accent),rgba(255,255,255,.09) 68%)}.demo{position:absolute;left:64px;right:64px;top:320px;transform:translateY(52px);padding:24px;border-radius:30px;background:rgba(255,255,255,.12);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Soft Harbor</h1><p class="lede">稍后进入安全港。视觉温和，但动作结果足够明确。</p><ul class="bullet-list"><li>方向：下滑稍后。</li><li>清晰点：安全港吸收卡片。</li><li>适合：用户不想现在处理，但仍信任系统保留。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">稍后 78%</span></div><div class="hero"><div class="hero-kicker">LATER</div><div class="hero-title">Harbor</div></div><div class="demo"><h2>北京北站行动提案</h2><p>卡片进入安全港，稍后再出现。</p></div><div class="harbor"></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Redacted Left</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#18100f;--panel:rgba(239,117,100,.13);--line:rgba(255,214,208,.2);--text:#fff4e6;--muted:rgba(255,244,230,.72);--accent:#ef7564}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.mask{position:absolute;left:74px;right:86px;top:350px;height:112px;border-radius:24px;background:repeating-linear-gradient(180deg,var(--accent) 0 16px,rgba(0,0,0,.24) 16px 28px)}.demo{position:absolute;left:62px;right:82px;top:330px;transform:translateX(-40px);padding:24px;border-radius:30px;background:rgba(255,255,255,.13);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Redacted Left</h1><p class="lede">遮盖条覆盖内容，表达这条提案会被归档，不再占用注意力。</p><ul class="bullet-list"><li>方向：左滑丢掉。</li><li>清晰点：内容被遮盖。</li><li>适合：信息密度高的通知流。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">丢掉 78%</span></div><div class="hero"><div class="hero-kicker">DISCARD</div><div class="hero-title">Redact</div></div><div class="demo"><h2>北京北站行动提案</h2><p>遮盖已覆盖，松手归档。</p></div><div class="mask"></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

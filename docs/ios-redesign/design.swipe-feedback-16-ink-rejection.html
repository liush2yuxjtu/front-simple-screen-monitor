<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Ink Rejection</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#151111;--panel:rgba(240,109,98,.13);--line:rgba(255,210,205,.2);--text:#fff4e6;--muted:rgba(255,244,230,.72);--accent:#f06d62}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.tear{position:absolute;left:48px;top:236px;bottom:138px;width:38px;background:repeating-linear-gradient(180deg,var(--accent) 0 10px,transparent 10px 19px)}.demo{position:absolute;left:60px;right:72px;top:330px;transform:translateX(-42px);padding:24px;border-radius:30px;background:rgba(255,255,255,.13);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Ink Rejection</h1><p class="lede">左滑时出现墨红撕边，表达“这条被拿掉”，比普通红色更有物理感。</p><ul class="bullet-list"><li>方向：左滑丢掉。</li><li>清晰点：撕边和卡片位移同步。</li><li>适合：明显不需要但可撤销的提案。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">丢掉 78%</span></div><div class="hero"><div class="hero-kicker">DISCARD</div><div class="hero-title">Rejection</div></div><div class="tear"></div><div class="demo"><h2>北京北站行动提案</h2><p>撕边已出现，松手丢掉。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

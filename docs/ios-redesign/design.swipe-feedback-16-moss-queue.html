<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Moss Queue</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#14170e;--panel:rgba(149,189,107,.13);--line:rgba(228,255,196,.2);--text:#f7ffe9;--muted:rgba(247,255,233,.72);--accent:#95bd6b}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.ticker{position:absolute;left:46px;right:46px;bottom:92px;height:34px;border-radius:999px;background:linear-gradient(90deg,var(--accent) 68%,rgba(255,255,255,.12) 68%)}.demo{position:absolute;left:64px;right:64px;top:322px;transform:translateY(46px);padding:24px;border-radius:30px;background:rgba(255,255,255,.12);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Moss Queue</h1><p class="lede">底部 ticker 表示动作进入队尾。它不是 fallback button，而是结果预览。</p><ul class="bullet-list"><li>方向：下滑稍后。</li><li>清晰点：队尾进度条。</li><li>适合：安静、低压、长期使用的任务流。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">稍后 78%</span></div><div class="hero"><div class="hero-kicker">LATER</div><div class="hero-title">Queue</div></div><div class="demo"><h2>北京北站行动提案</h2><p>卡片进入队尾，下一轮再提醒。</p></div><div class="ticker"></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Green Delay</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#0d1710;--panel:rgba(114,201,139,.13);--line:rgba(214,255,225,.2);--text:#f1fff4;--muted:rgba(241,255,244,.72);--accent:#72c98b}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.slot{position:absolute;left:50px;right:50px;bottom:82px;height:76px;border-radius:28px;background:repeating-linear-gradient(90deg,rgba(114,201,139,.5) 0 34px,rgba(255,255,255,.09) 34px 48px)}.demo{position:absolute;left:60px;right:60px;top:308px;transform:translateY(54px);padding:24px;border-radius:30px;background:rgba(255,255,255,.12);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Green Delay</h1><p class="lede">稍后不是失败，是进入下一轮队列。底部槽位让下滑结果明确。</p><ul class="bullet-list"><li>方向：下滑稍后。</li><li>清晰点：卡片下沉进队列槽。</li><li>适合：低紧急度但不能消失的任务。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">稍后 78%</span></div><div class="hero"><div class="hero-kicker">LATER</div><div class="hero-title">Delay</div></div><div class="demo"><h2>北京北站行动提案</h2><p>队列槽已接住卡片，松手稍后。</p></div><div class="slot"></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

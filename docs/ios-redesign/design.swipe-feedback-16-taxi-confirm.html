<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Taxi Confirm</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#201507;--panel:rgba(255,191,82,.13);--line:rgba(255,234,186,.2);--text:#fff7e6;--muted:rgba(255,247,230,.72);--accent:#ffbf52}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.route{position:absolute;left:52px;right:52px;top:214px;height:118px;border:3px dashed var(--accent);border-left:0;border-bottom:0;border-radius:0 36px 0 0}.demo{position:absolute;left:78px;right:60px;top:350px;transform:translateX(42px);padding:24px;border-radius:30px;background:rgba(255,255,255,.13);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Taxi Confirm</h1><p class="lede">路线虚线和执行区联动，特别适合出行、导航、即时确认。</p><ul class="bullet-list"><li>方向：右滑执行。</li><li>清晰点：路线视觉进入执行目标。</li><li>适合：打车、路线、会议加入。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">执行 78%</span></div><div class="hero"><div class="hero-kicker">EXECUTE</div><div class="hero-title">Taxi</div></div><div class="route"></div><div class="demo"><h2>北京北站行动提案</h2><p>路线已接入右侧执行区，松手确认。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Silent Dismiss</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#180d12;--panel:rgba(214,93,115,.13);--line:rgba(255,210,220,.2);--text:#fff4f6;--muted:rgba(255,244,246,.72);--accent:#d65d73}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.line{position:absolute;left:50px;top:230px;bottom:108px;width:34px;border-radius:999px;background:linear-gradient(transparent,var(--accent),transparent)}.demo{position:absolute;left:62px;right:82px;top:338px;transform:translateX(-38px);padding:24px;border-radius:30px;background:rgba(255,255,255,.13);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Silent Dismiss</h1><p class="lede">低亮左侧分割线，减少惩罚感。适合“清掉”而不是“危险删除”。</p><ul class="bullet-list"><li>方向：左滑丢掉。</li><li>清晰点：安静的左侧吸附线。</li><li>适合：普通通知清理。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">丢掉 78%</span></div><div class="hero"><div class="hero-kicker">DISCARD</div><div class="hero-title">Silent</div></div><div class="line"></div><div class="demo"><h2>北京北站行动提案</h2><p>左侧线已锁定，松手清掉。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

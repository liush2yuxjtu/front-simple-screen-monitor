<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Glass Witness</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#10151a;--panel:rgba(169,214,255,.13);--line:rgba(220,240,255,.22);--text:#f5fbff;--muted:rgba(245,251,255,.72);--accent:#a9d6ff}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.witness{position:absolute;left:46px;right:46px;top:202px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.witness i{height:82px;border-radius:20px;background:rgba(169,214,255,.18);border:1px solid var(--line)}.demo{position:absolute;left:58px;right:58px;top:390px;padding:24px;border-radius:30px;background:rgba(255,255,255,.12);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Glass Witness</h1><p class="lede">证词片先浮出，用户知道上滑会看到引用，而不是执行别的事。</p><ul class="bullet-list"><li>方向：上滑依据。</li><li>清晰点：两块玻璃证词片。</li><li>适合：引用驱动的行动建议。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">依据 78%</span></div><div class="hero"><div class="hero-kicker">DETAIL</div><div class="hero-title">Witness</div></div><div class="witness"><i></i><i></i></div><div class="demo"><h2>北京北站行动提案</h2><p>证词窗已展开，松手查看依据。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Copper Rail</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#1b120d;--panel:rgba(201,130,67,.13);--line:rgba(255,220,186,.2);--text:#fff4e6;--muted:rgba(255,244,230,.72);--accent:#c98243}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.rail{position:absolute;right:36px;top:190px;bottom:80px;width:46px;border-radius:999px;background:linear-gradient(var(--accent),rgba(201,130,67,.12))}.demo{position:absolute;left:70px;right:84px;top:330px;transform:translateX(42px);padding:24px;border-radius:30px;background:rgba(255,255,255,.13);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Copper Rail</h1><p class="lede">右侧执行 rail 常驻，拖动越深 rail 越实，降低误触。</p><ul class="bullet-list"><li>方向：右滑执行。</li><li>清晰点：固定目标轨道。</li><li>适合：重复使用的高频执行动作。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">执行 78%</span></div><div class="hero"><div class="hero-kicker">EXECUTE</div><div class="hero-title">Rail</div></div><div class="rail"></div><div class="demo"><h2>北京北站行动提案</h2><p>已压上执行 rail，松手提交。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

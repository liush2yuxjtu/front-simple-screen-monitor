<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Signal Lift</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#0b1719;--panel:rgba(121,199,216,.13);--line:rgba(211,248,255,.2);--text:#f2fdff;--muted:rgba(242,253,255,.72);--accent:#79c7d8}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.beam{position:absolute;left:50%;top:178px;width:210px;height:210px;transform:translateX(-50%);border-radius:50%;background:radial-gradient(circle,var(--accent),transparent 64%);opacity:.52}.demo{position:absolute;left:62px;right:62px;top:364px;transform:translateY(-46px);padding:24px;border-radius:30px;background:rgba(255,255,255,.12);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Signal Lift</h1><p class="lede">上滑时卡片被雷达光束抬起，表达“拿起来看原因”。</p><ul class="bullet-list"><li>方向：上滑依据。</li><li>清晰点：光束托举。</li><li>适合：解释性强、需要一点科技感的版本。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">依据 78%</span></div><div class="hero"><div class="hero-kicker">DETAIL</div><div class="hero-title">Lift</div></div><div class="beam"></div><div class="demo"><h2>北京北站行动提案</h2><p>光束已托起卡片，松手查看依据。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

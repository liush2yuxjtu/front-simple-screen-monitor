<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Blue Evidence</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#0c1320;--panel:rgba(143,183,255,.13);--line:rgba(210,226,255,.22);--text:#f3f7ff;--muted:rgba(243,247,255,.72);--accent:#8fb7ff}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.drawer{position:absolute;left:46px;right:46px;top:190px;height:128px;border-radius:28px;background:rgba(143,183,255,.22);border:1px solid var(--line);display:grid;place-items:center;font:900 20px/1 var(--ui-font)}.demo{position:absolute;left:58px;right:58px;top:360px;padding:24px;border-radius:30px;background:rgba(255,255,255,.12);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Blue Evidence</h1><p class="lede">上滑打开依据抽屉。证据区域先露出，让“上滑=看原因”变得直观。</p><ul class="bullet-list"><li>方向：上滑依据。</li><li>清晰点：顶部证据抽屉提前展开。</li><li>适合：需要建立信任的 AI 判断。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">依据 78%</span></div><div class="hero"><div class="hero-kicker">DETAIL</div><div class="hero-title">Evidence</div></div><div class="drawer">判断依据</div><div class="demo"><h2>北京北站行动提案</h2><p>上方抽屉已打开，松手查看完整依据。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Receipt Pull</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#10131c;--panel:rgba(155,188,255,.13);--line:rgba(220,232,255,.22);--text:#f4f7ff;--muted:rgba(244,247,255,.72);--accent:#9bbcff}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.receipt{position:absolute;left:76px;right:76px;top:176px;height:150px;border-radius:18px;background:linear-gradient(180deg,#fff,var(--accent));color:#172033;display:grid;place-items:center;font:900 28px/1 var(--ui-font)}.demo{position:absolute;left:58px;right:58px;top:388px;padding:24px;border-radius:30px;background:rgba(255,255,255,.12);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Receipt Pull</h1><p class="lede">依据页像收据从顶部拉出，强调可审计和可信来源。</p><ul class="bullet-list"><li>方向：上滑依据。</li><li>清晰点：收据从顶部展开。</li><li>适合：需要解释“为什么这样做”的场景。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">依据 78%</span></div><div class="hero"><div class="hero-kicker">DETAIL</div><div class="hero-title">Receipt</div></div><div class="receipt">WHY</div><div class="demo"><h2>北京北站行动提案</h2><p>依据收据已拉出，松手查看。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Command Halo</title><link rel="stylesheet" href="./design.shared.css" /><style>:root{--page:#150e09;--panel:rgba(215,161,113,.13);--line:rgba(255,224,196,.2);--text:#fff4e6;--muted:rgba(255,244,230,.72);--accent:#d7a171}.detail{width:min(1180px,calc(100vw - 32px));min-height:100dvh;margin:auto;display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:center}.phone{min-height:760px}.halo{position:absolute;left:54px;right:54px;top:312px;height:158px;border-radius:38px;border:7px solid var(--accent);clip-path:polygon(0 0,86% 0,86% 100%,0 100%)}.demo{position:absolute;left:70px;right:70px;top:330px;padding:24px;border-radius:30px;background:rgba(255,255,255,.13);border:1px solid var(--line)}@media(max-width:900px){.detail{grid-template-columns:1fr}.phone{width:100%}}</style></head><body><main class="detail"><section class="panel side"><a class="back" href="./design.swipe-feedback-16.html">Back to 16</a><h1>Command Halo</h1><p class="lede">执行 halo 包住整张卡。不到 100% 不提交，清楚但克制。</p><ul class="bullet-list"><li>方向：右滑执行。</li><li>清晰点：整卡进度 halo。</li><li>适合：误触成本较高的执行。</li></ul></section><section class="phone"><div class="mesh"></div><div class="phone-top"><span class="clock">13:42</span><span class="clock">执行 86%</span></div><div class="hero"><div class="hero-kicker">EXECUTE</div><div class="hero-title">Halo</div></div><div class="halo"></div><div class="demo"><h2>北京北站行动提案</h2><p>halo 快要闭合，继续右滑提交。</p></div></section></main><script src="./swipe-feedback-detail.js"></script></body></html>
